joint_pd_controller:
  # PD 게인 (각 관절: [j1, j2, j3, j4, j5, j6])
  kp: [5.0, 5.0, 5.0, 5.0, 5.0, 5.0]
  kd: [0.5, 0.5, 0.5, 0.5, 0.5, 0.5]

  # 중력 보상 활성화 (true = PD + g(q), false = 순수 PD)
  enable_gravity_compensation: false

  # 코리올리/원심력 보상 활성화 (true = + C(q,v)·v)
  enable_coriolis_compensation: false

  # 궤적 최대 속도 (rad/s), 이동 거리 기반 소요 시간 계산에 사용
  trajectory_speed: 1.0

  # 출력 명령 타입: "torque" 또는 "position"
  command_type: "torque"
