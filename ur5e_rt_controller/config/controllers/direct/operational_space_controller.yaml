operational_space_controller:
  # ── 데카르트 PD 게인 ──────────────────────────────────────────────────────
  kp_pos: [1.0, 1.0, 1.0]               # 위치 비례 게인 (x, y, z)
  kd_pos: [0.1, 0.1, 0.1]               # 위치 미분 게인 (x, y, z)
  kp_rot: [0.5, 0.5, 0.5]               # 회전 비례 게인 (rx, ry, rz)
  kd_rot: [0.05, 0.05, 0.05]            # 회전 미분 게인 (rx, ry, rz)

  # ── 특이점 감쇠 ───────────────────────────────────────────────────────────
  damping: 0.01                           # 야코비안 감쇠 유사역행렬 λ

  # ── 동역학 보상 ───────────────────────────────────────────────────────────
  enable_gravity_compensation: false      # 중력 보상 활성화 (true = + g(q))

  # ── 궤적 속도 제한 ────────────────────────────────────────────────────────
  trajectory_speed: 0.1                   # TCP 최대 병진 속도 (m/s)
  trajectory_angular_speed: 0.5           # TCP 최대 회전 속도 (rad/s)

  # ── 출력 타입 ─────────────────────────────────────────────────────────────
  command_type: "torque"

  # ── 디바이스 활성화 (미설정 시 글로벌 기본값 상속) ──────────────────────────
  # enable_ur5e: true
  # enable_hand: false

  # ── 토픽 설정 ─────────────────────────────────────────────────────────────
  topics:
    ur5e:
      subscribe:
        # 카테고리 1: Goal State (궤적 최종 목표)
        - topic: "/ur5e/target_joint_positions"
          role: "goal"
        # 카테고리 2: Current State (센서 피드백)
        - topic: "/joint_states"
          role: "joint_state"
      publish:
        # 카테고리 3: Control Command (액추에이터 출력)
        - topic: "/forward_torque_controller/commands"
          role: "torque_command"
        # 카테고리 4: Logging/Monitoring (진단 발행)
        - topic: "/ur5e/current_task_position"
          role: "task_position"
          data_size: 6
        - topic: "/ur5e/trajectory_state"
          role: "trajectory_state"
          data_size: 18
        - topic: "/ur5e/controller_state"
          role: "controller_state"
          data_size: 18
    hand:
      subscribe:
        - topic: "/hand/joint_states"
          role: "hand_state"
