operational_space_controller:
  kp_pos: [1.0, 1.0, 1.0]
  kd_pos: [0.1, 0.1, 0.1]
  kp_rot: [0.5, 0.5, 0.5]
  kd_rot: [0.05, 0.05, 0.05]
  damping: 0.01
  trajectory_speed: 0.1
  trajectory_angular_speed: 0.5
  command_type: "torque"

  # ── Topic Configuration ────────────────────────────────────────────────────
  topics:
    subscribe:
      - topic: "/joint_states"
        role: "joint_state"
      - topic: "/hand/joint_states"
        role: "hand_state"
      - topic: "/target_joint_positions"
        role: "target"
    publish:
      - topic: "/forward_torque_controller/commands"
        role: "torque_command"
      - topic: "/rt_controller/current_task_position"
        role: "task_position"
