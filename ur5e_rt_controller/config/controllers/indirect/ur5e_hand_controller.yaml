ur5e_hand_controller:
  # ── UR5e 로봇 암 P 게인 ([Base, Shoulder, Elbow, Wrist1, Wrist2, Wrist3]) ─
  # command = current_pos + kp * error * dt (증분 위치 스텝)
  robot_kp: [120.0, 120.0, 100.0, 80.0, 80.0, 80.0]

  # ── 핸드 모터 P 게인 (10개 모터) ──────────────────────────────────────────
  hand_kp: [50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0]

  # ── 출력 타입 ─────────────────────────────────────────────────────────────
  command_type: "position"

  # ── 토픽 설정 ─────────────────────────────────────────────────────────────
  topics:
    subscribe:
      - topic: "/joint_states"
        role: "joint_state"
      - topic: "/hand/joint_states"
        role: "hand_state"
      - topic: "/target_joint_positions"
        role: "target"
    publish:
      - topic: "/forward_position_controller/commands"
        role: "position_command"
        data_size: 6
      - topic: "/hand/command"
        role: "hand_command"
        data_size: 10
      - topic: "/rt_controller/current_task_position"
        role: "task_position"
        data_size: 6
