# hand_udp_node.yaml — Hand UDP 드라이버 설정
#
# 동작 모드:
#   - rt_controller 통합 (기본): ControlLoop에서 event-driven으로 구동
#     Phase 3.5에서 SendCommandAndRequestStates() → EventLoop가 write + read 수행
#   - standalone (hand_udp_node 단독 실행): ROS2 토픽으로 상태 퍼블리시/명령 구독
#
# 통신 프로토콜 (1 사이클):
#   1. Write position  (cmd=0x01) → 10 float (모터 커맨드)
#   2. Read position   (cmd=0x11) → request & recv 10 float
#   3. Read velocity   (cmd=0x12) → request & recv 10 float
#   4. Read sensor 0-3 (cmd=0x14..0x17) → request & recv × 4
#
# Standalone 모드 ROS2 토픽:
#   pub: /hand/joint_states  [positions:10 + velocities:10 + sensors:44] = 64 doubles
#   sub: /hand/command        motor_commands[10] (0.0–1.0)

/**:
  ros__parameters:
    # ── Fake hand 모드 ──────────────────────────────────────────────────────
    use_fake_hand: false              # true: echo-back mock (UDP 소켓 미생성)
                                      # command를 즉시 position state로 반환
                                      # launch argument로 override 가능

    # ── UDP 통신 설정 ──────────────────────────────────────────────────────
    # rt_controller 통합 + standalone 공용
    target_ip: "192.168.1.2"          # 핸드 컨트롤러 IP (빈 문자열 → hand 비활성)
    target_port: 55151                # 핸드 컨트롤러 포트 (0 → hand 비활성)
    recv_timeout_ms: 10               # SO_RCVTIMEO (ms), 수신 타임아웃
    enable_write_ack: false           # 핸드 하드웨어 ACK 지원 시 true
    sensor_decimation: 4              # N cycle마다 센서 읽기 (1=매번, 4=4cycle마다)
                                      # decimation=4: 평균 ~1.3ms/cycle (write+pos+vel만)
                                      # 센서 skip 시 이전 캐시 데이터 유지

    # ── 모터/핑거팁 이름 (v5.14.0 named messaging) ──────────────────────
    # 비어있으면 기본 이름 사용.
    hand_motor_names:
      - "thumb_cmc_aa"
      - "thumb_cmc_fe"
      - "thumb_mcp_fe"
      - "index_mcp_aa"
      - "index_mcp_fe"
      - "index_dip_fe"
      - "middle_mcp_aa"
      - "middle_mcp_fe"
      - "middle_dip_fe"
      - "ring_mcp_fe"

    hand_fingertip_names:
      - "thumb"
      - "index"
      - "middle"
      - "ring"

    # ── Standalone 전용 설정 (hand_udp_node 단독 실행 시) ────────────────
    publish_rate: 100.0               # /hand/joint_states 퍼블리시 주기 (Hz)

    # ── Failure Detector 설정 (50Hz non-RT jthread) ────────────────────────
    enable_failure_detector: true     # Failure detector 활성화
    failure_threshold: 5              # 연속 감지 횟수 임계값 (all-zero 또는 중복 데이터)
    check_motor: true                 # 모터 position 데이터 검사
    check_sensor: true                # 센서 데이터 검사

    # Rate monitoring (failure detector에서 사용)
    min_rate_hz: 30.0               # 최소 허용 polling rate
    rate_fail_threshold: 5          # 연속 N회 미달 시 failure
