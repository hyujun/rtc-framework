# hand_udp.yaml - v3.0.0 (request-response protocol)
# HandController: request-response polling over single UDP socket
#
# 패킷 형식: 43 bytes (little-endian)
#   [ID: 0x01] [CMD: 1B] [MODE: 0x00] [data: 10 × float32]
#
# 통신 플로우 (1 사이클):
#   1. Write position  (cmd=0x01) → 10 float
#   2. Read position   (cmd=0x11) → request & recv 10 float
#   3. Read velocity   (cmd=0x12) → request & recv 10 float
#   4. Read sensor 0-3 (cmd=0x14..0x17) → request & recv × 4
#
# ROS2 토픽:
#   pub: /hand/joint_states (positions[10] + velocities[10] + sensors[40])
#   sub: /hand/command      (motor_commands[10])

# ── UDP 설정 ────────────────────────────────────────────────────────────────
udp:
  target_ip: "192.168.1.100"     # 핸드 컨트롤러 IP
  target_port: 50002             # 핸드 컨트롤러 포트

# ── ROS2 퍼블리시 설정 ────────────────────────────────────────────────────────
publishing:
  rate: 100.0                    # /hand/joint_states 퍼블리시 주기 (Hz)
  topic: "/hand/joint_states"
  queue_size: 10

# ── 10-DOF 핸드 설정 ──────────────────────────────────────────────────────────
hand:
  num_motors: 10                 # kNumHandMotors = 10 (ur5e_rt_base/types.hpp)
  num_fingertips: 4              # kNumFingertips = 4
  joint_names:
    - "hand_motor_0"
    - "hand_motor_1"
    - "hand_motor_2"
    - "hand_motor_3"
    - "hand_motor_4"
    - "hand_motor_5"
    - "hand_motor_6"
    - "hand_motor_7"
    - "hand_motor_8"
    - "hand_motor_9"

# ── 모니터링 설정 ─────────────────────────────────────────────────────────────
monitoring:
  enable_statistics: true
  statistics_period: 5.0         # 패킷 통계 출력 주기 (초)
