# hand_udp.yaml - v2.0.0 (unified HandUdpNode)
# 통합 노드용 설정: recv + send를 하나의 프로세스에서 처리
#
# UDP 수신 패킷 형식: 77 double (616 bytes) — hand_packets::HandRecvPacket
#   [0..10]  motor_positions[11]   — 모터 위치
#   [11..21] motor_velocities[11]  — 모터 속도
#   [22..32] motor_currents[11]    — 모터 전류
#   [33..76] sensor_data[44]       — 촉각 센서 (관절당 4개)
#
# UDP 송신 패킷 형식: 11 double (88 bytes) — hand_packets::HandSendPacket
#   [0..10]  motor_commands[11]    — 모터 명령
#
# ROS2 토픽:
#   pub: /hand/joint_states (motor_positions[11])
#   sub: /hand/command      (motor_commands[11])

# ── UDP 설정 ────────────────────────────────────────────────────────────────
udp:
  recv_port: 50001               # 수신 포트 (hand controller → PC)
  target_ip: "192.168.1.100"     # 송신 대상 IP (PC → hand controller)
  target_port: 50002             # 송신 대상 포트

# ── ROS2 퍼블리시 설정 ────────────────────────────────────────────────────────
publishing:
  rate: 100.0                    # /hand/joint_states 퍼블리시 주기 (Hz)
  topic: "/hand/joint_states"
  queue_size: 10

# ── 11-DOF 핸드 설정 ──────────────────────────────────────────────────────────
hand:
  num_joints: 11                 # kNumHandJoints = 11 (ur5e_rt_base/types.hpp)
  joint_names:
    - "hand_motor_0"
    - "hand_motor_1"
    - "hand_motor_2"
    - "hand_motor_3"
    - "hand_motor_4"
    - "hand_motor_5"
    - "hand_motor_6"
    - "hand_motor_7"
    - "hand_motor_8"
    - "hand_motor_9"
    - "hand_motor_10"

# ── 모니터링 설정 ─────────────────────────────────────────────────────────────
monitoring:
  enable_statistics: true
  statistics_period: 5.0         # 패킷 통계 출력 주기 (초)
  log_packet_loss: true
