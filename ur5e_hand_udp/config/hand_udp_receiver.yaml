# hand_udp_receiver.yaml - v3.0.0 (request-response protocol)
# Legacy config — use hand_udp.yaml with unified HandUdpNode instead.
#
# 패킷 형식: 43 bytes
#   [ID: 0x01] [CMD: 1B] [MODE: 0x00] [data: 10 × float32]

# ── UDP 설정 ──────────────────────────────────────────────────────────────
udp:
  target_ip: "192.168.1.100"
  target_port: 50002

# ── ROS2 퍼블리시 설정 ────────────────────────────────────────────────────────
publishing:
  rate: 100.0
  topic: "/hand/joint_states"
  queue_size: 10

# ── 10-DOF 핸드 설정 ──────────────────────────────────────────────────────────
hand:
  num_motors: 10                 # kNumHandMotors = 10 (ur5e_rt_base/types.hpp)
  num_fingertips: 4
  joint_names:
    - "hand_motor_0"
    - "hand_motor_1"
    - "hand_motor_2"
    - "hand_motor_3"
    - "hand_motor_4"
    - "hand_motor_5"
    - "hand_motor_6"
    - "hand_motor_7"
    - "hand_motor_8"
    - "hand_motor_9"

# ── 모니터링 설정 ─────────────────────────────────────────────────────────────
monitoring:
  enable_statistics: true
  statistics_period: 5.0
  log_packet_loss: true
