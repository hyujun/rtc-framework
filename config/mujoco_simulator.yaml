# MuJoCo Simulator Node Configuration
# ─────────────────────────────────────
# Launch with:
#   ros2 launch ur5e_rt_controller mujoco_sim.launch.py
#   ros2 launch ur5e_rt_controller mujoco_sim.launch.py enable_viewer:=false
#   ros2 launch ur5e_rt_controller mujoco_sim.launch.py sim_speed:=2.0

mujoco_simulator:
  ros__parameters:

    # ── Model ────────────────────────────────────────────────────────────────
    # Path to scene.xml.
    # Empty string → resolved automatically to:
    #   <package_share>/models/ur5e/scene.xml
    # Absolute path → used as-is (e.g. for MuJoCo Menagerie model).
    model_path: ""

    # ── Simulation ───────────────────────────────────────────────────────────
    # Control loop frequency [Hz].
    # Must match the timestep in scene.xml (timestep = 1 / control_freq).
    #   500 Hz → timestep = 0.002 s  (default in ur5e.xml)
    control_freq: 500.0

    # Real-time synchronisation.
    #   true  → sleep to match wall-clock (best for interactive use)
    #   false → run as fast as possible (best for data collection / CI)
    realtime: true

    # Simulation speed multiplier (only effective when realtime: true).
    #   1.0 → normal speed
    #   2.0 → 2× faster than real time
    sim_speed: 1.0

    # ── Viewer ───────────────────────────────────────────────────────────────
    # Open a GLFW window for 3D visualisation.
    # Set false for headless / SSH environments (no display required).
    enable_viewer: true

    # ── Initial joint positions [rad] — UR5e safe upright pose ───────────────
    #   [shoulder_pan, shoulder_lift, elbow, wrist_1, wrist_2, wrist_3]
    initial_joint_positions: [0.0, -1.5708, 1.5708, -1.5708, -1.5708, 0.0]

    # ── Hand simulation (low-pass filter on /hand/command) ───────────────────
    enable_hand_sim: true

    # 1st-order filter coefficient per 10 ms timer tick (100 Hz).
    # hand_state += alpha * (hand_target - hand_state)
    #   0.1  → ~90 ms settling time constant
    #   0.5  → ~18 ms settling time constant (stiffer)
    hand_filter_alpha: 0.1
