# iiwa7_allegro/sim.yaml — KUKA iiwa7 + Allegro (right) simulation config
# Used by sim_iiwa7_allegro.launch.py (MuJoCo simulation mode)
# Hand sensor stack (baro/ToF/contact/F-PI) is intentionally disabled for this
# robot — Allegro has no equivalent hardware. Grasp controllers are deactivated
# in the per-controller YAMLs by setting demo_shared.grasp_controller_type=none.
/**:
  ros__parameters:
    # ── Config variant directory ─────────────────────────────────────────────
    # Drives controller / shared YAML lookup paths:
    # <pkg>/config/<config_variant>/controllers/<key>.yaml.
    config_variant: "iiwa7_allegro"

    # ── Robot namespace ───────────────────────────────────────────────────────
    robot_namespace: "iiwa7"

    # ── Control rate ──────────────────────────────────────────────────────────
    control_rate: 500.0

    # ── Initial controller ────────────────────────────────────────────────────
    initial_controller: "demo_joint_controller"

    # ── Initialization timeout ────────────────────────────────────────────────
    init_timeout_sec: 0.0

    # ── Auto-hold position ────────────────────────────────────────────────────
    auto_hold_position: true

    # ── Simulation sync ──────────────────────────────────────────────────────
    use_sim_time_sync: true
    sim_sync_timeout_sec: 5.0

    # ── E-STOP configuration ─────────────────────────────────────────────────
    enable_estop: false
    device_timeout_names: ["iiwa7", "allegro"]
    device_timeout_values: [10000.0, 10000.0]

    # ── Logging configuration ─────────────────────────────────────────────────
    enable_logging: true
    enable_timing_log: true
    enable_device_log: true
    log_dir: ""
    max_log_sessions: 10

    # ── System URDF + model topology ─────────────────────────────────────────
    urdf:
      package: "robot_descriptions"
      path: "robots/iiwa7_allegro/urdf/iiwa7_with_allegro_right.urdf.xacro"
      root_joint_type: "fixed"
      sub_models:
        iiwa7:
          root_link: "link_0"
          tip_link: "ee_link"
      tree_models:
        allegro:
          root_link: "base_link"
          tip_links:
            - "link_15.0_tip"  # thumb
            - "link_3.0_tip"   # index
            - "link_7.0_tip"   # middle
            - "link_11.0_tip"  # ring
        # WBC control tree (iiwa7 7-DoF + allegro 16-DoF = 23 DoF reduced).
        wbc:
          root_link: "link_0"
          tip_links:
            - "link_15.0_tip"
            - "link_3.0_tip"
            - "link_7.0_tip"
            - "link_11.0_tip"

    # ── Device configuration ──────────────────────────────────────────────────
    devices:
      iiwa7:
        joint_state_names:
          - "A1"
          - "A2"
          - "A3"
          - "A4"
          - "A5"
          - "A6"
          - "A7"
        joint_limits:
          # iiwa7 official limits (from KUKA datasheet, mirrored in MJCF).
          max_velocity:     [1.71, 1.71, 1.74, 2.27, 2.44, 3.14, 3.14]
          max_acceleration: [5.0, 5.0, 5.0, 5.0, 5.0, 5.0, 5.0]
          max_torque:       [200.0, 200.0, 200.0, 200.0, 200.0, 200.0, 200.0]
          position_lower:   [-2.9671, -2.0944, -2.9671, -2.0944, -2.9671, -2.0944, -3.0543]
          position_upper:   [ 2.9671,  2.0944,  2.9671,  2.0944,  2.9671,  2.0944,  3.0543]
      allegro:
        joint_state_names:
          # Controller-facing order: thumb (12–15), index (0–3), middle (4–7), ring (8–11).
          # Differs from URDF/MJCF declaration order (which is index → middle → ring → thumb);
          # BuildJointReorderMap handles the model↔controller index mapping at runtime.
          - "joint_12.0"
          - "joint_13.0"
          - "joint_14.0"
          - "joint_15.0"
          - "joint_0.0"
          - "joint_1.0"
          - "joint_2.0"
          - "joint_3.0"
          - "joint_4.0"
          - "joint_5.0"
          - "joint_6.0"
          - "joint_7.0"
          - "joint_8.0"
          - "joint_9.0"
          - "joint_10.0"
          - "joint_11.0"
        # No sensor stack: baro / ToF / contact / F-PI are Allegro-incompatible.
        joint_limits:
          # Limits follow the joint_state_names order above (thumb first).
          max_velocity:
            [6.28, 6.28, 6.28, 6.28, 6.28, 6.28, 6.28, 6.28,
             6.28, 6.28, 6.28, 6.28, 6.28, 6.28, 6.28, 6.28]
          position_lower:
            [ 0.263, -0.105, -0.189, -0.162, -0.47, -0.196, -0.174, -0.227,
             -0.47,  -0.196, -0.174, -0.227, -0.47, -0.196, -0.174, -0.227]
          position_upper:
            [ 1.396, 1.163,  1.644,  1.719,  0.47,  1.61,   1.709,  1.618,
              0.47,  1.61,   1.709,  1.618,  0.47,  1.61,   1.709,  1.618]
