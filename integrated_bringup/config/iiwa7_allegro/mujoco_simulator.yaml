# MuJoCo Simulator — iiwa7 (7-DoF) + Allegro right hand (16-DoF) configuration
# ─────────────────────────────────────────────────────────────────────────────
# Loaded by integrated_bringup/launch/sim_iiwa7_allegro.launch.py.
# Generic defaults: rtc_mujoco_sim/config/mujoco_default.yaml.
# RTC controller param overrides: integrated_bringup/config/iiwa7_allegro_sim.yaml.

mujoco_simulator:
  ros__parameters:
    # ── Model ────────────────────────────────────────────────────────────────
    model_path: "package://robot_descriptions/robots/iiwa7_allegro/mjcf/scene_right.xml"

    # ── Sync timeout ─────────────────────────────────────────────────────────
    sync_timeout_ms: 50.0

    # ── Max Real-Time Factor ──────────────────────────────────────────────────
    max_rtf: 1.0

    # ── Viewer ───────────────────────────────────────────────────────────────
    enable_viewer: true
    viewer_refresh_rate: 60.0

    # ── Physics Timestep ──────────────────────────────────────────────────────
    physics_timestep: 0.002
    n_substeps: 3

    # ── Position Servo Gains ──────────────────────────────────────────────────
    # MJCF authors gainprm/biasprm in default classes (iiwa_large, iiwa_small,
    # allegro_finger); keep use_yaml_servo_gains=false to honor those values.
    use_yaml_servo_gains: false

    # ── Robot Response ────────────────────────────────────────────────────────
    robot_response:
      groups: ["iiwa7", "allegro"]
      iiwa7:
        command_joint_names:
          - A1
          - A2
          - A3
          - A4
          - A5
          - A6
          - A7
        state_joint_names:
          - A1
          - A2
          - A3
          - A4
          - A5
          - A6
          - A7
        command_topic: "/iiwa7/joint_command"
        state_topic: "/joint_states"
      allegro:
        command_joint_names:
          - joint_0.0
          - joint_1.0
          - joint_2.0
          - joint_3.0
          - joint_4.0
          - joint_5.0
          - joint_6.0
          - joint_7.0
          - joint_8.0
          - joint_9.0
          - joint_10.0
          - joint_11.0
          - joint_12.0
          - joint_13.0
          - joint_14.0
          - joint_15.0
        state_joint_names:
          - joint_0.0
          - joint_1.0
          - joint_2.0
          - joint_3.0
          - joint_4.0
          - joint_5.0
          - joint_6.0
          - joint_7.0
          - joint_8.0
          - joint_9.0
          - joint_10.0
          - joint_11.0
          - joint_12.0
          - joint_13.0
          - joint_14.0
          - joint_15.0
        command_topic: "/allegro/joint_command"
        state_topic: "/allegro/joint_states"
