# demo_joint_controller — iiwa7 + LEAP variant
# Pure joint-space trajectory tracking. Grasp controller deactivated via
# demo_shared.yaml (grasp_controller_type: "none"); hand stream is plain
# joint passthrough — no sensor / motor / grasp topics in/out.
demo_joint_controller:
  # ── Trajectory speed ───────────────────────────────────────────────────────
  robot_trajectory_speed: 0.78
  hand_trajectory_speed: 3.14

  # ── Trajectory velocity limits ─────────────────────────────────────────────
  robot_max_traj_velocity: 1.71  # iiwa7 A1/A2/A3 datasheet limit
  hand_max_traj_velocity: 6.28

  # ── FSM tuning (required by LoadConfig) ───────────────────────────────────
  fsm:
    contact_stop_release_eps: 0.005

  # ── E-STOP ─────────────────────────────────────────────────────────────────
  estop:
    arm_safe_position:           # rad, 7 values = iiwa7 DoF (home pose)
      - 0.0
      - 0.7
      - 0.0
      - -1.4
      - 0.0
      - 0.7
      - 0.0

  # ── Output type ────────────────────────────────────────────────────────────
  command_type: "position"

  # ── Topic configuration ────────────────────────────────────────────────────
  topics:
    iiwa7:
      subscribe:
        - topic: "iiwa7/joint_goal"
          role: "target"
          ownership: "controller"
        - topic: "/joint_states"
          role: "state"
      publish:
        - topic: "/iiwa7/joint_command"
          role: "joint_command"
        # Per-controller TF (single publisher → entry on first group).
        - topic: "transforms"
          role: "robot_transforms"
          ownership: "controller"
    leap:
      subscribe:
        - topic: "leap/joint_goal"
          role: "target"
          ownership: "controller"
        - topic: "/leap/joint_states"
          role: "state"
      publish:
        - topic: "/leap/joint_command"
          role: "joint_command"

  # ── Controller-owned CSV logs ──────────────────────────────────────────────
  logs:
    - msg_type: rtc_msgs/DeviceStateLog
      instance: iiwa7_state
    - msg_type: rtc_msgs/DeviceStateLog
      instance: leap_state
