# demo_task_controller — iiwa7 + LEAP variant
# CLIK task-space tracking for the arm + hand joint passthrough. Grasp
# controller deactivated (see demo_shared.yaml grasp_controller_type: "none").
demo_task_controller:
  # ── CLIK gains ─────────────────────────────────────────────────────────────
  kp_translation: [5.0, 5.0, 5.0]
  kp_rotation: [2.0, 2.0, 2.0]
  damping: 0.01

  # ── Null-space ─────────────────────────────────────────────────────────────
  # iiwa7 is 7-DoF → null-space exists; off by default, enable for redundancy
  # resolution experiments.
  enable_null_space: false
  null_kp: 0.5

  # ── 6-DOF mode ─────────────────────────────────────────────────────────────
  control_6dof: true

  # ── Trajectory speed ───────────────────────────────────────────────────────
  trajectory_speed: 0.01
  trajectory_angular_speed: 0.08727
  hand_trajectory_speed: 3.14

  # ── Trajectory velocity limits ─────────────────────────────────────────────
  max_traj_velocity: 0.1
  max_traj_angular_velocity: 0.7854
  hand_max_traj_velocity: 6.28

  # ── E-STOP ─────────────────────────────────────────────────────────────────
  estop:
    arm_safe_position:           # rad, 7 values = iiwa7 DoF (home pose)
      - 0.0
      - 0.7
      - 0.0
      - -1.4
      - 0.0
      - 0.7
      - 0.0

  # ── FSM / trajectory tuning ────────────────────────────────────────────────
  fsm:
    pi_rotation_margin: 0.15
    contact_stop_release_eps: 0.005

  # ── Output type ────────────────────────────────────────────────────────────
  command_type: "position"

  # ── Topic configuration ────────────────────────────────────────────────────
  # Phase 4: device-wire lanes moved to devices.<group>.backend.
  topics:
    iiwa7:
      subscribe:
        - topic: "iiwa7/joint_goal"
          role: "target"
          ownership: "controller"
      publish:
        - topic: "transforms"
          role: "robot_transforms"
          ownership: "controller"
    leap:
      subscribe:
        - topic: "leap/joint_goal"
          role: "target"
          ownership: "controller"

  # ── Controller-owned CSV logs ──────────────────────────────────────────────
  logs:
    - msg_type: rtc_msgs/DeviceStateLog
      instance: iiwa7_state
    - msg_type: rtc_msgs/DeviceStateLog
      instance: leap_state
