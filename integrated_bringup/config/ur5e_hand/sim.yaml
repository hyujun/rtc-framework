# ur5e_hand/sim.yaml — UR5e + assm_v1 hand simulation config
# Used by sim.launch.py (MuJoCo simulation mode)
# For real robot, use ur5e_hand/robot.yaml instead.
/**:
  ros__parameters:
    # ── Config variant directory ─────────────────────────────────────────────
    # Drives controller / shared / mpc YAML lookup paths:
    # <pkg>/config/<config_variant>/controllers/<key>.yaml.
    config_variant: "ur5e_hand"

    # ── Control rate ──────────────────────────────────────────────────────────
    control_rate: 500.0 # Hz — timer period = 1e6/rate us

    # ── Initial controller ────────────────────────────────────────────────────
    initial_controller: "demo_wbc_controller"

    # ── Initialization timeout ────────────────────────────────────────────────
    init_timeout_sec: 0.0 # Disabled for simulation (no real hardware init)

    # ── Auto-hold position ────────────────────────────────────────────────────
    auto_hold_position: true # Auto-target current position when no external goal

    # ── Simulation sync ──────────────────────────────────────────────────────
    use_sim_time_sync: true       # CV-based wakeup (sim), false = clock_nanosleep (real)
    sim_sync_timeout_sec: 5.0     # Shutdown if no state received within timeout

    # ── E-STOP configuration (relaxed for simulation) ────────────────────────
    enable_estop: false # Disabled for simulation
    device_timeout_names: ["ur5e", "hand"]
    device_timeout_values: [10000.0, 10000.0] # Relaxed for sim startup

    # ── Logging configuration ─────────────────────────────────────────────────
    enable_logging: true
    enable_timing_log: true
    enable_device_log: true # auto-creates per-device log files
    log_dir: ""
    max_log_sessions: 10

    # ── System URDF + model topology (shared by all controllers) ──────────
    urdf:
      package: "robot_descriptions"
      path: "robots/ur5e_assm_v1/urdf/ur5e_with_hand.urdf.xacro"
      root_joint_type: "fixed"
      sub_models:
        ur5e:
          root_link: "base"
          tip_link: "tool0"
      tree_models:
        hand:
          root_link: "hand_base_link"
          tip_links: ["thumb_tip_link", "index_tip_link", "middle_tip_link", "ring_tip_link"]
        # WBC control tree (arm + hand, shared by TSID and MPC). Mimic
        # joints are auto-classified as passive/kMimic by UrdfAnalyzer and
        # locked during buildReducedModel, yielding a clean nq == nv == 16
        # model (6 arm + 10 actuated hand DoFs). TSID tasks/constraints and
        # MPC handler-mode prediction both operate in this reduced space;
        # mimic kinematics are handled downstream by the hardware driver /
        # MuJoCo tendon.
        wbc:
          root_link: "base"
          tip_links: ["thumb_tip_link", "index_tip_link", "middle_tip_link", "ring_tip_link"]
      # passive_joints:
      #   - "thumb_cmc_aa"
      #   - "thumb_cmc_fe"
      #   - "thumb_mcp_fe"
      #   - "index_mcp_aa"
      #   - "index_mcp_fe"
      #   - "index_dip_fe"
      #   - "middle_mcp_aa"
      #   - "middle_mcp_fe"
      #   - "middle_dip_fe"
      #   - "ring_mcp_fe"

    # ── Device configuration (keyed by controller topic group name) ─────────
    # Phase 4: devices.<group>.backend is the SSoT for HW/sim adapter type +
    # wire-format topics. CM creates one DeviceBackend per group from this
    # block; controller YAMLs only own target / robot_transforms / grasp_state
    # / wbc_state / tof_snapshot.
    devices:
      ur5e:
        backend:
          type: "mujoco_native"            # sim mode: MuJoCo bridge
          state_topic: "/joint_states"     # sim publishes full URDF joints here
          command_topic: "/ur5e/joint_command"
        joint_state_names:
          - "shoulder_pan_joint"
          - "shoulder_lift_joint"
          - "elbow_joint"
          - "wrist_1_joint"
          - "wrist_2_joint"
          - "wrist_3_joint"
        joint_limits:
          max_velocity:     [2.0, 2.0, 3.0, 3.0, 3.0, 3.0]
          max_acceleration: [5.0, 5.0, 5.0, 5.0, 5.0, 5.0]
          max_torque:       [150.0, 150.0, 150.0, 28.0, 28.0, 28.0]
          position_lower:   [-6.28, -6.28, -3.14, -6.28, -6.28, -6.28]
          position_upper:   [6.28, 6.28, 3.14, 6.28, 6.28, 6.28]
      hand:
        backend:
          type: "mujoco_native"            # sim mode: MuJoCo bridge (no motor / sensor lanes)
          state_topic: "/hand/joint_states"
          command_topic: "/hand/joint_command"
        joint_state_names:
          - "thumb_cmc_aa"
          - "thumb_cmc_fe"
          - "thumb_mcp_fe"
          - "index_mcp_aa"
          - "index_mcp_fe"
          - "index_dip_fe"
          - "middle_mcp_aa"
          - "middle_mcp_fe"
          - "middle_dip_fe"
          - "ring_mcp_fe"
        sensor_names:
          - "thumb"
          - "index"
          - "middle"
          - "ring"
        joint_limits:
          max_velocity:   [6.28, 6.28, 6.28, 6.28, 6.28, 6.28, 6.28, 6.28, 6.28, 6.28]
          position_lower: [-1.57, -1.57, -1.57, -0.15, 0.0, 0.0, -0.15, 0.0, 0.0, 0.0]
          position_upper: [1.57, 1.57, 0.00, 0.15, 1.57, 1.57, 0.15, 1.57, 1.57, 1.57]
        # Sensor packing layout — CM uses these for stride/offset arithmetic
        # only; field semantics (barometer/ToF/contact/F/u) live in
        # udp_hand_driver. assm_v1 hand: 8 baro + 3 ToF per fingertip, ML
        # inference = contact(1) + F(3) + u(3) = 7.
        # (Not consumed in sim mode because backend.sensor_topic is unset.)
        sensor_layout:
          primary_count_per_group:        8
          secondary_count_per_group:      3
          values_per_group:               11
          inference_values_per_group:     7
