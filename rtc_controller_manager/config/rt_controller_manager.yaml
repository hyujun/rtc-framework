# rt_controller_manager.yaml — generic controller manager configuration
/**:
  ros__parameters:
    # ── Robot namespace (used for manager-level topics) ────────────────────────
    robot_namespace: "ur5e"

    # ── Control rate ─────────────────────────────────────────────────────────────
    control_rate: 500.0              # Hz

    # ── Starting controller ─────────────────────────────────────────────────────
    initial_controller: "joint_pd_controller"

    # ── Initialization timeout ───────────────────────────────────────────────────
    init_timeout_sec: 30.0

    # ── Auto-hold position ─────────────────────────────────────────────────────
    auto_hold_position: true

    # ── E-STOP settings ─────────────────────────────────────────────────────────
    enable_estop: true
    device_timeout_names: ["ur5e"]
    device_timeout_values: [100.0]

    # ── Logging settings ─────────────────────────────────────────────────────────
    enable_logging: true
    enable_timing_log: true
    enable_device_log: true
    log_dir: ""
    max_log_sessions: 10

    # ── Device configuration (keyed by controller topic group name) ─────────
    devices:
      ur5e:
        joint_state_names:
          - "shoulder_pan_joint"
          - "shoulder_lift_joint"
          - "elbow_joint"
          - "wrist_1_joint"
          - "wrist_2_joint"
          - "wrist_3_joint"
        sensor_names: []
        safe_position: [0.0, -1.5708, 1.5708, -1.5708, -1.5708, 0.0]
        urdf:
          package: "ur5e_description"
          path: "robots/ur5e/urdf/ur5e.urdf"
          root_link: "base_link"
          tip_link: "wrist_3_link"
        joint_limits:
          max_velocity:     [2.0, 2.0, 3.0, 3.0, 3.0, 3.0]
          max_acceleration: [5.0, 5.0, 5.0, 5.0, 5.0, 5.0]
          max_torque:       [150.0, 150.0, 150.0, 28.0, 28.0, 28.0]
          position_lower:   [-6.28, -6.28, -3.14, -6.28, -6.28, -6.28]
          position_upper:   [6.28, 6.28, 3.14, 6.28, 6.28, 6.28]

    # ── Status Monitor (optional, non-RT) ─────────────────────────────────────
    enable_status_monitor: false
