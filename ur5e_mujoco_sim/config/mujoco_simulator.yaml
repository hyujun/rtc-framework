# MuJoCo Simulator Node Configuration (v5.3.0)
# ─────────────────────────────────────────────
# Launch with:
#   ros2 launch ur5e_mujoco_sim mujoco_sim.launch.py
#   ros2 launch ur5e_mujoco_sim mujoco_sim.launch.py sim_mode:=sync_step
#   ros2 launch ur5e_mujoco_sim mujoco_sim.launch.py enable_viewer:=false

mujoco_simulator:
  ros__parameters:
    # ── Model ────────────────────────────────────────────────────────────────
    # Path to scene.xml.
    # Empty string → resolved automatically to:
    #   <ur5e_description_share>/robots/ur5e/mjcf/scene.xml
    # Absolute path → used as-is (e.g. for MuJoCo Menagerie model).
    model_path: ""

    # ── Simulation mode ───────────────────────────────────────────────────────
    # "free_run"  — advance physics as fast as possible (default).
    #               Best for algorithm validation, trajectory generation.
    #               Set enable_estop: false in rt_controller config!
    # "sync_step" — publish state → wait for command → step (1:1 sync).
    #               Step latency ≈ Compute() time → direct timing measurement.
    sim_mode: "sync_step"

    # free_run only: publish /joint_states every N physics steps.
    # Increase to reduce DDS traffic when the sim runs much faster than 500 Hz.
    #   1  → publish every step (maximum data, highest DDS load)
    #   10 → publish every 10th step (~50 Hz if sim runs at 500 Hz equivalent)
    publish_decimation: 1

    # sync_step only: max time to wait for a controller command (ms).
    # If no command arrives within this window, the previous command is reused.
    sync_timeout_ms: 50.0

    # ── Max Real-Time Factor ──────────────────────────────────────────────────
    # Maximum simulation speed as a multiple of real time (0.0 = unlimited).
    # The sim loop sleeps after each mj_step() to keep RTF ≤ this value.
    # Applies to both free_run and sync_step modes.
    #
    # Examples:
    #   0.0   → unlimited (default, max hardware speed)
    #   1.0   → real-time (RTF = 1× — matches wall clock)
    #   10.0  → 10× real time (10 simulated seconds per wall second)
    #   100.0 → 100× real time
    max_rtf: 1.0

    # ── Viewer ───────────────────────────────────────────────────────────────
    # Open a GLFW window for 3D visualisation.
    # Set false for headless / SSH environments.
    enable_viewer: true

    # ── Physics Timestep ──────────────────────────────────────────────────────
    # MuJoCo 물리 스텝 주기 (seconds). control_rate의 역수 (0.002 s = 500 Hz).
    # XML의 <option timestep="...">과 비교 검증:
    #   0.0      → XML 값 그대로 사용 (검증 없음)
    #   일치      → 정상
    #   불일치    → RCLCPP_ERROR 출력 후 XML 값 우선 적용
    # position servo의 YAML gain 스케일링 기준:
    #   gainprm = servo_kp / physics_timestep
    physics_timestep: 0.002   # seconds  (= 500 Hz)

    # ── Position Servo Gains ──────────────────────────────────────────────────
    # use_yaml_servo_gains: true  → servo_kp/kd를 gainprm/biasprm으로 사용
    #                      false → XML 원본 gainprm/biasprm 사용 (기본값)
    #
    # servo_kp: velocity gain (Nm·s/rad).
    #   gainprm = servo_kp / physics_timestep
    #   → force = servo_kp * dq_cmd - servo_kd * dq_actual
    #   servo_kp > servo_kd 조건 만족 시 servo가 damping을 이김
    #
    # position servo 모드 진입 시 gravity가 자동으로 OFF되며,
    # torque 모드로 전환 시 gravity가 자동으로 ON됩니다.
    use_yaml_servo_gains: false
    servo_kp: [500.0, 500.0, 500.0, 150.0, 150.0, 150.0]
    servo_kd: [400.0, 400.0, 400.0, 100.0, 100.0, 100.0]

    # ── Initial joint positions [rad] — UR5e safe upright pose ───────────────
    #   [shoulder_pan, shoulder_lift, elbow, wrist_1, wrist_2, wrist_3]
    initial_joint_positions: [0.0, -1.5708, 1.5708, -1.5708, -1.5708, 0.0]

    # ── Hand simulation (low-pass filter on /hand/command) ───────────────────
    enable_hand_sim: true

    # 1st-order filter coefficient per 10 ms timer tick (100 Hz).
    # hand_state += alpha * (hand_target - hand_state)
    #   0.1  → ~90 ms settling time constant
    #   0.5  → ~18 ms settling time constant (stiffer)
    hand_filter_alpha: 0.1

# ── rt_controller parameter overrides for simulation ─────────────────────
# ur5e_rt_controller.yaml 대비 시뮬레이션 전용 차이값만 오버라이드.
#   - enable_estop: false  — free_run 모드에서 wall-clock 지연으로 인한
#                            오탐 E-STOP 방지
#   - robot/hand_timeout_ms — sync_step / free_run 모두 timeout 여유 확보
rt_controller:
  ros__parameters:
    enable_estop: false
    robot_timeout_ms: 10000.0
    hand_timeout_ms: 10000.0
