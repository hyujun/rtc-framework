name: ROS2 Advanced CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 동일 브랜치 중복 실행 방지 — 새 push 시 이전 실행 자동 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  #  C++ Linting (distro matrix)
  # ============================================================
  lint-cpp:
    name: C++ Lint (${{ matrix.linter }}, ${{ matrix.ros_distro }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        linter: [cpplint, cppcheck]
        include:
          - os: ubuntu-22.04
            ros_distro: humble
          - os: ubuntu-24.04
            ros_distro: jazzy
      fail-fast: false
    steps:
    - uses: actions/checkout@v4
      with:
        path: src/rtc-framework

    - name: Setup ROS2 ${{ matrix.ros_distro }}
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: ${{ matrix.ros_distro }}

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ros-${{ matrix.ros_distro }}-pinocchio \
          libyaml-cpp-dev \
          libtinyxml2-dev \
          libeigen3-dev

    - name: Run Linter
      uses: ros-tooling/action-ros-lint@v0.1
      with:
        linter: ${{ matrix.linter }}
        package-name: |
          rtc_base
          rtc_communication
          rtc_controller_interface
          rtc_controller_manager
          rtc_controllers
          rtc_inference
          rtc_msgs
          urdf_pinocchio_bridge
          ur5e_bringup
          ur5e_hand_driver
        workspace-directory: src/rtc-framework
      env:
        # Ubuntu 24.04의 cppcheck 2.13.0 성능 이슈 차단 우회
        AMENT_CPPCHECK_ALLOW_SLOW_VERSIONS: 1

  # ============================================================
  #  Build, Test & Coverage (distro matrix)
  # ============================================================
  build-test-coverage:
    name: Build & Test (${{ matrix.ros_distro }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            ros_distro: humble
          - os: ubuntu-24.04
            ros_distro: jazzy
      fail-fast: false
    steps:
    - uses: actions/checkout@v4

    - name: Setup ROS2 ${{ matrix.ros_distro }}
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: ${{ matrix.ros_distro }}

    # setup-ros의 colcon이 다수 의존성 시 CMAKE_PREFIX_PATH 구분자를
    # 세미콜론(;)으로 설정하는 버그 수정 — pip으로 최신 버전 설치
    - name: Upgrade colcon
      run: pip install -U colcon-cmake colcon-core

    # colcon 빌드 캐시
    - name: Cache colcon workspace
      uses: actions/cache@v4
      with:
        path: |
          build/
          install/
        key: colcon-${{ matrix.ros_distro }}-${{ hashFiles('**/CMakeLists.txt', '**/package.xml') }}
        restore-keys: |
          colcon-${{ matrix.ros_distro }}-

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ros-${{ matrix.ros_distro }}-pinocchio \
          libyaml-cpp-dev \
          libtinyxml2-dev \
          libeigen3-dev \
          lcov

    - name: Build Packages (with coverage flags)
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        # MuJoCo/BT/ONNX 패키지 제외 (CI에 해당 라이브러리 미설치)
        colcon build \
          --packages-up-to \
            rtc_controller_manager \
            rtc_controllers \
            ur5e_bringup \
            ur5e_hand_driver \
            urdf_pinocchio_bridge \
            shape_estimation \
          --cmake-args \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            '-DCMAKE_CXX_FLAGS=--coverage -fprofile-arcs -ftest-coverage' \
            '-DCMAKE_C_FLAGS=--coverage' \
            '-DCMAKE_EXE_LINKER_FLAGS=--coverage' \
            '-DCMAKE_SHARED_LINKER_FLAGS=--coverage'

    - name: Run Tests
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        source install/setup.bash
        colcon test \
          --packages-select \
            rtc_controllers \
            urdf_pinocchio_bridge \
            shape_estimation \
          --event-handlers console_cohesion+ \
          --return-code-on-test-failure

    - name: Show Test Results
      if: always()
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        colcon test-result --all --verbose || true

    - name: Generate Coverage Report
      if: always()
      run: |
        # 빌드 실패 시 coverage 디렉토리가 없으면 skip
        if [ ! -d "build/rtc_controllers" ] && [ ! -d "build/urdf_pinocchio_bridge" ]; then
          echo "::warning::build directories not found — skipping coverage"
          exit 0
        fi

        set -e

        # lcov 버전 감지 (Ubuntu 22.04: 1.x, Ubuntu 24.04: 2.x)
        LCOV_MAJOR=$(lcov --version | grep -oP '\d+' | head -1)
        if [ "$LCOV_MAJOR" -ge 2 ]; then
          BRANCH_RC="--rc branch_coverage=1"
        else
          BRANCH_RC="--rc lcov_branch_coverage=1"
        fi

        # 테스트가 있는 패키지별로 coverage 수집
        COVERAGE_DIRS=""
        for pkg in rtc_controllers urdf_pinocchio_bridge shape_estimation; do
          if [ -d "build/$pkg" ]; then
            COVERAGE_DIRS="$COVERAGE_DIRS --directory build/$pkg"
          fi
        done

        if [ "$LCOV_MAJOR" -ge 2 ]; then
          # lcov 2.x: --initial 제거됨, --capture만 사용
          lcov --capture \
            $COVERAGE_DIRS \
            --output-file coverage_merged.info \
            $BRANCH_RC \
            --ignore-errors mismatch
        else
          # lcov 1.x: baseline + test coverage 병합
          lcov --capture --initial \
            $COVERAGE_DIRS \
            --output-file coverage_base.info \
            $BRANCH_RC

          lcov --capture \
            $COVERAGE_DIRS \
            --output-file coverage_test.info \
            $BRANCH_RC

          lcov --add-tracefile coverage_base.info \
            --add-tracefile coverage_test.info \
            --output-file coverage_merged.info \
            $BRANCH_RC
        fi

        # 프로젝트 소스 코드만 추출
        lcov --extract coverage_merged.info \
          '*/rtc_base/include/*' \
          '*/rtc_communication/include/*' \
          '*/rtc_controller_interface/include/*' \
          '*/rtc_controller_interface/src/*' \
          '*/rtc_controller_manager/src/*' \
          '*/rtc_controllers/include/*' \
          '*/rtc_controllers/src/*' \
          '*/rtc_inference/include/*' \
          '*/urdf_pinocchio_bridge/include/*' \
          '*/urdf_pinocchio_bridge/src/*' \
          '*/ur5e_bringup/include/*' \
          '*/ur5e_bringup/src/*' \
          '*/ur5e_hand_driver/include/*' \
          '*/ur5e_hand_driver/src/*' \
          '*/shape_estimation/include/*' \
          '*/shape_estimation/src/*' \
          --output-file coverage_extracted.info \
          $BRANCH_RC

        # 테스트 코드 자체는 제외
        lcov --remove coverage_extracted.info \
          '*/test/*' \
          '*/examples/*' \
          --output-file coverage_filtered.info \
          $BRANCH_RC

        # coverage 요약 출력
        echo "=== Coverage Summary ==="
        lcov --list coverage_filtered.info $BRANCH_RC || true

    - name: Upload Coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage_filtered.info
        flags: unittests-${{ matrix.ros_distro }}
        name: rtc-framework-${{ matrix.ros_distro }}
        fail_ci_if_error: false

    - name: Upload Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: colcon-logs-${{ matrix.ros_distro }}
        path: log/

  # ============================================================
  #  CodeQL Security Scan (humble only — 언어 분석이므로 distro 무관)
  # ============================================================
  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
    steps:
    - uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: cpp
        queries: security-extended

    - name: Setup ROS2
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: humble

    - name: Upgrade colcon
      run: pip install -U colcon-cmake colcon-core

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ros-humble-pinocchio \
          libyaml-cpp-dev \
          libtinyxml2-dev \
          libeigen3-dev

    - name: Build Packages
      run: |
        source /opt/ros/humble/setup.bash
        colcon build \
          --packages-up-to \
            rtc_controller_manager \
            rtc_controllers \
            ur5e_bringup \
            ur5e_hand_driver \
            urdf_pinocchio_bridge \
            shape_estimation \
          --cmake-args \
            -DCMAKE_BUILD_TYPE=Release

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  # ============================================================
  #  Clang-Tidy Analysis (distro matrix)
  # ============================================================
  clang-tidy:
    name: Clang-Tidy (${{ matrix.ros_distro }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            ros_distro: humble
          - os: ubuntu-24.04
            ros_distro: jazzy
      fail-fast: false
    steps:
    - uses: actions/checkout@v4

    - name: Setup ROS2 ${{ matrix.ros_distro }}
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: ${{ matrix.ros_distro }}

    - name: Upgrade colcon
      run: pip install -U colcon-cmake colcon-core

    # colcon 빌드 캐시 (build-test-coverage와 별도 키 — cmake args 다름)
    - name: Cache colcon workspace
      uses: actions/cache@v4
      with:
        path: |
          build/
          install/
        key: colcon-tidy-${{ matrix.ros_distro }}-${{ hashFiles('**/CMakeLists.txt', '**/package.xml') }}
        restore-keys: |
          colcon-tidy-${{ matrix.ros_distro }}-

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-tidy \
          ros-${{ matrix.ros_distro }}-pinocchio \
          libyaml-cpp-dev \
          libtinyxml2-dev \
          libeigen3-dev

    - name: Build with compile_commands.json
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        colcon build \
          --packages-up-to \
            rtc_controller_manager \
            rtc_controllers \
            ur5e_bringup \
            ur5e_hand_driver \
            urdf_pinocchio_bridge \
            shape_estimation \
          --cmake-args \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_BUILD_TYPE=Debug

    - name: Merge compile_commands.json
      run: |
        # 모든 패키지의 compile_commands.json 병합
        python3 -c "
        import json, glob
        commands = []
        for f in glob.glob('build/*/compile_commands.json'):
            with open(f) as fh:
                commands.extend(json.load(fh))
        with open('compile_commands.json', 'w') as fh:
            json.dump(commands, fh, indent=2)
        "

    - name: Run clang-tidy
      run: |
        echo "=== Clang-Tidy Analysis ==="
        # run-clang-tidy: 병렬 실행으로 성능 향상
        run-clang-tidy -p . -quiet \
          'rtc_controller_interface/src/.*\.cpp' \
          'rtc_controller_manager/src/.*\.cpp' \
          'rtc_controllers/src/.*\.cpp' \
          'urdf_pinocchio_bridge/src/.*\.cpp' \
          'ur5e_bringup/src/.*\.cpp' \
          'ur5e_hand_driver/src/.*\.cpp' \
          'shape_estimation/src/.*\.cpp' 2>&1 | \
          tee clang-tidy-output.txt || true

        # 경고/에러 요약
        echo ""
        echo "=== Summary ==="
        grep -c "warning:" clang-tidy-output.txt && echo "warnings found" || echo "No warnings"
        grep -c "error:" clang-tidy-output.txt && echo "errors found" || echo "No errors"

    - name: Upload clang-tidy Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: clang-tidy-report-${{ matrix.ros_distro }}
        path: clang-tidy-output.txt

  # ============================================================
  #  Claude Code Review (PR only)
  # ============================================================
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write       # OIDC 인증용
      contents: read        # 레포지토리 체크아웃용
      pull-requests: write  # PR 리뷰 코멘트 작성용
    steps:
    - uses: actions/checkout@v4

    - uses: anthropics/claude-code-action@v1
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
