name: ROS2 Advanced CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'rtc_scripts/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'rtc_scripts/**'
      - 'LICENSE'
      - '.gitignore'

# 동일 브랜치 중복 실행 방지 — 새 push 시 이전 실행 자동 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # ── 패키지 목록 (모든 job에서 공유) ──────────────────────────────
  # colcon --packages-up-to 빌드 대상 (의존성 자동 포함: rtc_base, rtc_msgs 등)
  # 제외: rtc_tsid (proxsuite 미설치), ur5e_bt_coordinator (behaviortree_cpp 미설치),
  #       rtc_mujoco_sim (MuJoCo 미설치)
  BUILD_PACKAGES: >-
    rtc_controller_manager
    rtc_controllers
    ur5e_bringup
    ur5e_hand_driver
    rtc_urdf_bridge
    shape_estimation
  # C++ 테스트 실행 대상 (BUILD_PACKAGES의 부분집합 + 의존성으로 빌드되는 rtc_base)
  CPP_TEST_PACKAGES: >-
    rtc_base
    rtc_controllers
    rtc_urdf_bridge
    shape_estimation
    ur5e_bringup
    ur5e_hand_driver
  PYTHON_TEST_PACKAGES: >-
    rtc_tools
    rtc_digital_twin
  # cppcheck 대상 (include/ 또는 src/ 가 있는 C++ 패키지)
  LINT_PACKAGES: >-
    rtc_base
    rtc_communication
    rtc_controller_interface
    rtc_controller_manager
    rtc_controllers
    rtc_inference
    rtc_msgs
    rtc_urdf_bridge
    shape_estimation
    ur5e_bringup
    ur5e_hand_driver

jobs:
  # ============================================================
  #  변경 감지 — 후속 job 실행 여부 결정
  # ============================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      cpp: ${{ steps.filter.outputs.cpp }}
      python: ${{ steps.filter.outputs.python }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          cpp:
            - '**/*.hpp'
            - '**/*.cpp'
            - '**/*.h'
            - '**/CMakeLists.txt'
            - '**/package.xml'
            - '**/*.yaml'
            - '**/*.yml'
            - '**/*.xml'
            - '**/*.urdf'
            - '**/*.msg'
            - '**/*.srv'
          python:
            - 'rtc_tools/**/*.py'
            - 'rtc_digital_twin/**/*.py'
            - 'rtc_tools/setup.py'
            - 'rtc_tools/setup.cfg'
            - 'rtc_digital_twin/setup.py'
            - 'rtc_digital_twin/setup.cfg'
            - 'rtc_msgs/msg/*.msg'
            - 'rtc_msgs/srv/*.srv'
  # ============================================================
  #  C++ Linting (cppcheck) — jazzy 1회만 실행
  #  cppcheck는 컴파일러/distro 무관 정적 분석이므로 matrix 불필요.
  #  clang-tidy가 상위 호환이나, cppcheck는 빌드 없이 빠르게 실행 가능.
  # ============================================================
  lint-cpp:
    name: C++ Lint (cppcheck)
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4

    - name: Setup ROS2 Jazzy
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: jazzy

    - name: Cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: >-
          ros-jazzy-pinocchio
          ros-jazzy-tinyxml2-vendor
          libyaml-cpp-dev
          libtinyxml2-dev
          libeigen3-dev
        version: jazzy-lint-v3

    - name: Run cppcheck
      env:
        AMENT_CPPCHECK_ALLOW_SLOW_VERSIONS: 1
      run: |
        source /opt/ros/jazzy/setup.bash

        # LINT_PACKAGES 환경 변수에서 패키지 목록 로드
        read -ra PACKAGES <<< "$LINT_PACKAGES"

        ERRORS=0
        for pkg in "${PACKAGES[@]}"; do
          if [ ! -d "$pkg" ]; then continue; fi
          echo "=== Checking $pkg ==="

          # include/ 와 src/ 디렉토리만 검사 (test/ 제외)
          DIRS=""
          [ -d "$pkg/include" ] && DIRS="$DIRS $pkg/include"
          [ -d "$pkg/src" ] && DIRS="$DIRS $pkg/src"

          if [ -z "$DIRS" ]; then
            echo "  No include/ or src/ — skipped"
            continue
          fi

          ament_cppcheck $DIRS || ERRORS=$((ERRORS + 1))
        done

        if [ "$ERRORS" -gt 0 ]; then
          echo "::error::cppcheck found errors in $ERRORS package(s)"
          exit 1
        fi

  # ============================================================
  #  Python Tests (rtc_tools, rtc_digital_twin)
  # ============================================================
  python-test:
    name: Python Test (${{ matrix.ros_distro }})
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            ros_distro: jazzy
      fail-fast: false
    steps:
    - uses: actions/checkout@v4

    - name: Setup ROS2 ${{ matrix.ros_distro }}
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: ${{ matrix.ros_distro }}

    - name: Upgrade colcon
      run: pip install -U colcon-cmake colcon-core

    - name: Install Python test dependencies
      run: pip install pytest

    - name: Build Python packages
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        colcon build \
          --packages-up-to $PYTHON_TEST_PACKAGES

    - name: Run Python tests
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        source install/setup.bash
        colcon test \
          --packages-select $PYTHON_TEST_PACKAGES \
          --event-handlers console_cohesion+ \
          --return-code-on-test-failure

    - name: Show Test Results
      if: always()
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        colcon test-result --all --verbose || true

  # ============================================================
  #  Build, Test & Coverage (distro matrix)
  # ============================================================
  build-test-coverage:
    name: Build & Test (${{ matrix.ros_distro }})
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            ros_distro: jazzy
      fail-fast: false
    steps:
    - uses: actions/checkout@v4

    - name: Setup ROS2 ${{ matrix.ros_distro }}
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: ${{ matrix.ros_distro }}

    # setup-ros의 colcon이 다수 의존성 시 CMAKE_PREFIX_PATH 구분자를
    # 세미콜론(;)으로 설정하는 버그 수정 — pip으로 최신 버전 설치
    - name: Upgrade colcon
      run: pip install -U colcon-cmake colcon-core

    - name: Cache colcon workspace
      uses: actions/cache@v4
      with:
        path: |
          build/
          install/
        key: colcon-${{ matrix.ros_distro }}-v4-${{ hashFiles('**/CMakeLists.txt', '**/package.xml', '**/*.hpp', '**/*.cpp') }}
        restore-keys: |
          colcon-${{ matrix.ros_distro }}-v4-

    - name: Cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: >-
          ros-${{ matrix.ros_distro }}-pinocchio
          ros-${{ matrix.ros_distro }}-xacro
          ros-${{ matrix.ros_distro }}-tinyxml2-vendor
          libyaml-cpp-dev
          libtinyxml2-dev
          libeigen3-dev
          lcov
        version: ${{ matrix.ros_distro }}-build-v4

    - name: Build Packages (with coverage)
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        colcon build \
          --packages-up-to $BUILD_PACKAGES \
          --cmake-args \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_TESTING=ON \
            '-DCMAKE_CXX_FLAGS=--coverage -fprofile-arcs -ftest-coverage' \
            '-DCMAKE_C_FLAGS=--coverage' \
            '-DCMAKE_EXE_LINKER_FLAGS=--coverage' \
            '-DCMAKE_SHARED_LINKER_FLAGS=--coverage'

    - name: Run Tests
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        source install/setup.bash
        colcon test \
          --packages-select $CPP_TEST_PACKAGES \
          --event-handlers console_cohesion+ \
          --return-code-on-test-failure

    - name: Dump failed test output
      if: failure()
      run: |
        echo "## Failed Test Details" >> "$GITHUB_STEP_SUMMARY"
        for pkg in rtc_base rtc_controllers rtc_urdf_bridge shape_estimation ur5e_bringup ur5e_hand_driver; do
          if [ -d "build/${pkg}" ]; then
            echo "### ${pkg}" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cd "build/${pkg}" && ctest --output-on-failure --no-tests=ignore 2>&1 | tail -200 >> "$GITHUB_STEP_SUMMARY" || true
            cd "$GITHUB_WORKSPACE"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
        done

    - name: Show Test Results
      if: always()
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash

        echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        colcon test-result --all --verbose 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true
        echo '```' >> "$GITHUB_STEP_SUMMARY"

        # Emit failed tests as GitHub annotations (visible via API)
        colcon test-result --all --verbose 2>&1 | grep -E "FAILED|ERROR|failed" | while IFS= read -r line; do
          echo "::error title=Test Failure::$line"
        done || true

    - name: Generate Coverage Report
      if: always()
      run: |
        # 빌드 실패 시 skip
        if [ ! -d "build" ] || [ -z "$(ls -A build/ 2>/dev/null)" ]; then
          echo "::warning::build directories not found — skipping coverage"
          exit 0
        fi

        set -e

        # lcov 버전 감지 (Ubuntu 22.04: 1.x, Ubuntu 24.04: 2.x)
        LCOV_MAJOR=$(lcov --version | grep -oP '\d+' | head -1)
        if [ "$LCOV_MAJOR" -ge 2 ]; then
          BRANCH_RC="--rc branch_coverage=1"
          LCOV_IGNORE="--ignore-errors unused,mismatch"
        else
          BRANCH_RC="--rc lcov_branch_coverage=1"
          LCOV_IGNORE=""
        fi

        # CPP_TEST_PACKAGES와 동일한 패키지에서 coverage 수집
        COVERAGE_DIRS=""
        for pkg in rtc_base rtc_controllers rtc_urdf_bridge shape_estimation ur5e_bringup ur5e_hand_driver; do
          if [ -d "build/$pkg" ]; then
            COVERAGE_DIRS="$COVERAGE_DIRS --directory build/$pkg"
          fi
        done

        if [ -z "$COVERAGE_DIRS" ]; then
          echo "::warning::No build directories found for coverage"
          exit 0
        fi

        if [ "$LCOV_MAJOR" -ge 2 ]; then
          lcov --capture \
            $COVERAGE_DIRS \
            --output-file coverage_merged.info \
            $BRANCH_RC \
            $LCOV_IGNORE
        else
          lcov --capture --initial \
            $COVERAGE_DIRS \
            --output-file coverage_base.info \
            $BRANCH_RC

          lcov --capture \
            $COVERAGE_DIRS \
            --output-file coverage_test.info \
            $BRANCH_RC

          lcov --add-tracefile coverage_base.info \
            --add-tracefile coverage_test.info \
            --output-file coverage_merged.info \
            $BRANCH_RC
        fi

        # 프로젝트 소스 코드만 추출
        lcov --extract coverage_merged.info \
          '*/rtc_base/include/*' \
          '*/rtc_communication/include/*' \
          '*/rtc_controller_interface/include/*' \
          '*/rtc_controller_interface/src/*' \
          '*/rtc_controller_manager/src/*' \
          '*/rtc_controllers/include/*' \
          '*/rtc_controllers/src/*' \
          '*/rtc_inference/include/*' \
          '*/rtc_urdf_bridge/include/*' \
          '*/rtc_urdf_bridge/src/*' \
          '*/ur5e_bringup/include/*' \
          '*/ur5e_bringup/src/*' \
          '*/ur5e_hand_driver/include/*' \
          '*/ur5e_hand_driver/src/*' \
          '*/shape_estimation/include/*' \
          '*/shape_estimation/src/*' \
          --output-file coverage_extracted.info \
          $BRANCH_RC \
          $LCOV_IGNORE

        # 테스트 코드 자체는 제외
        lcov --remove coverage_extracted.info \
          '*/test/*' \
          '*/examples/*' \
          --output-file coverage_filtered.info \
          $BRANCH_RC \
          $LCOV_IGNORE

        echo "=== Coverage Summary ==="
        lcov --list coverage_filtered.info $BRANCH_RC || true

    - name: Upload Coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage_filtered.info
        flags: unittests-${{ matrix.ros_distro }}
        name: rtc-framework-${{ matrix.ros_distro }}
        fail_ci_if_error: false

    - name: Upload Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: colcon-logs-${{ matrix.ros_distro }}
        path: log/

  # ============================================================
  #  CodeQL Security Scan — main push만 (PR 제외)
  # ============================================================
  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    permissions:
      security-events: write
    steps:
    - uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: cpp
        queries: security-extended

    - name: Setup ROS2
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: jazzy

    - name: Upgrade colcon
      run: pip install -U colcon-cmake colcon-core

    - name: Cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: >-
          ros-jazzy-pinocchio
          ros-jazzy-tinyxml2-vendor
          libyaml-cpp-dev
          libtinyxml2-dev
          libeigen3-dev
        version: jazzy-codeql-v1

    - name: Build Packages
      run: |
        source /opt/ros/jazzy/setup.bash
        colcon build \
          --packages-up-to $BUILD_PACKAGES \
          --cmake-args \
            -DCMAKE_BUILD_TYPE=Release

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  # ============================================================
  #  Clang-Tidy Analysis — jazzy 1회, build-test와 병렬 실행
  #  자체 빌드 수행 (coverage 플래그 없이 깨끗한 compile_commands.json 생성)
  # ============================================================
  clang-tidy:
    name: Clang-Tidy
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4

    # required-ros-distributions 생략 → ros-jazzy-desktop(963 pkg, 598 MB) 설치 방지
    # ROS2 apt 저장소 추가 + 개발 도구만 설치
    - name: Setup ROS2 tooling
      uses: ros-tooling/setup-ros@v0.7

    - name: Upgrade colcon
      run: pip install -U colcon-cmake colcon-core

    # build-test-coverage와 캐시 키를 분리 (coverage 플래그 혼입 방지)
    - name: Cache colcon workspace
      uses: actions/cache@v4
      with:
        path: |
          build/
          install/
        key: colcon-tidy-jazzy-${{ hashFiles('**/CMakeLists.txt', '**/package.xml') }}
        restore-keys: |
          colcon-tidy-jazzy-

    # ros-jazzy-ros-base: desktop(963 pkg) 대신 최소 ROS2 런타임(~200 pkg)
    # visualization-msgs, std-srvs: ros-base에 미포함된 프로젝트 의존성
    - name: Cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: >-
          clang-tidy
          ros-jazzy-ros-base
          ros-jazzy-visualization-msgs
          ros-jazzy-std-srvs
          ros-jazzy-pinocchio
          ros-jazzy-tinyxml2-vendor
          libyaml-cpp-dev
          libtinyxml2-dev
          libeigen3-dev
        version: jazzy-tidy-v4

    # coverage 플래그 없이 빌드하여 깨끗한 분석 보장
    # BUILD_TESTING=OFF: clang-tidy는 테스트 빌드 불필요 (gtest 의존성 제거)
    - name: Build Packages
      run: |
        source /opt/ros/jazzy/setup.bash
        colcon build \
          --packages-up-to $BUILD_PACKAGES \
          --cmake-args \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTING=OFF

    - name: Merge compile_commands.json
      run: |
        python3 -c "
        import json, glob
        commands = []
        for f in glob.glob('build/*/compile_commands.json'):
            with open(f) as fh:
                commands.extend(json.load(fh))
        with open('compile_commands.json', 'w') as fh:
            json.dump(commands, fh, indent=2)
        print(f'Merged {len(commands)} compilation entries')
        "

    - name: Run clang-tidy
      run: |
        echo "=== Clang-Tidy Analysis ==="
        run-clang-tidy -p . -quiet \
          'rtc_controller_interface/src/.*\.cpp' \
          'rtc_controller_manager/src/.*\.cpp' \
          'rtc_controllers/src/.*\.cpp' \
          'rtc_urdf_bridge/src/.*\.cpp' \
          'ur5e_bringup/src/.*\.cpp' \
          'ur5e_hand_driver/src/.*\.cpp' \
          'shape_estimation/src/.*\.cpp' 2>&1 | \
          tee clang-tidy-output.txt || true

        # Job Summary에 경고/에러 수 출력
        WARNINGS=$(grep -c "warning:" clang-tidy-output.txt || true)
        ERRORS=$(grep -c "error:" clang-tidy-output.txt || true)
        echo ""
        echo "=== Summary ==="
        echo "Warnings: $WARNINGS"
        echo "Errors: $ERRORS"

        # GitHub Actions Job Summary
        echo "## Clang-Tidy Results" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Warnings**: $WARNINGS" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Errors**: $ERRORS" >> "$GITHUB_STEP_SUMMARY"

    - name: Upload clang-tidy Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: clang-tidy-report
        path: clang-tidy-output.txt

  # ============================================================
  #  Claude Code Review (PR only)
  # ============================================================
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Workflow validation requires the file to match main — expected to fail
    # on PRs that modify the workflow file itself.
    continue-on-error: true
    permissions:
      id-token: write       # OIDC 인증용
      contents: read        # 레포지토리 체크아웃용
      pull-requests: write  # PR 리뷰 코멘트 작성용
    steps:
    - uses: actions/checkout@v4

    - uses: anthropics/claude-code-action@v1
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
