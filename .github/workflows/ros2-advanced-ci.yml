name: ROS2 Advanced CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

# 동일 브랜치 중복 실행 방지 — 새 push 시 이전 실행 자동 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  #  C++ Linting (distro matrix)
  # ============================================================
  lint-cpp:
    name: C++ Lint (${{ matrix.linter }}, ${{ matrix.ros_distro }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            ros_distro: humble
          - os: ubuntu-24.04
            ros_distro: jazzy
        linter: [cpplint, cppcheck]
      fail-fast: false
    steps:
    - uses: actions/checkout@v4
      with:
        path: src/ur5e-rt-controller

    - name: Setup ROS2 ${{ matrix.ros_distro }}
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: ${{ matrix.ros_distro }}

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ros-${{ matrix.ros_distro }}-pinocchio \
          ros-${{ matrix.ros_distro }}-ur-robot-driver \
          ros-${{ matrix.ros_distro }}-realtime-tools

    - name: Run Linter
      uses: ros-tooling/action-ros-lint@v0.1
      with:
        linter: ${{ matrix.linter }}
        package-name: |
          ur5e_rt_base
          ur5e_rt_controller
          ur5e_hand_udp
          ur5e_status_monitor
        workspace-directory: src/ur5e-rt-controller

  # ============================================================
  #  Build, Test & Coverage (distro matrix)
  # ============================================================
  build-test-coverage:
    name: Build & Test (${{ matrix.ros_distro }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            ros_distro: humble
          - os: ubuntu-24.04
            ros_distro: jazzy
      fail-fast: false
    steps:
    - uses: actions/checkout@v4

    - name: Setup ROS2 ${{ matrix.ros_distro }}
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: ${{ matrix.ros_distro }}

    # colcon 빌드 캐시
    - name: Cache colcon workspace
      uses: actions/cache@v4
      with:
        path: |
          build/
          install/
        key: colcon-${{ matrix.ros_distro }}-${{ hashFiles('**/CMakeLists.txt', '**/package.xml') }}
        restore-keys: |
          colcon-${{ matrix.ros_distro }}-

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ros-${{ matrix.ros_distro }}-pinocchio \
          ros-${{ matrix.ros_distro }}-ur-robot-driver \
          ros-${{ matrix.ros_distro }}-ur-msgs \
          ros-${{ matrix.ros_distro }}-ur-description \
          ros-${{ matrix.ros_distro }}-realtime-tools \
          lcov

    - name: Build Packages (with coverage flags)
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        # --packages-up-to: ur5e_description 등 의존성 자동 해결
        colcon build \
          --packages-up-to ur5e_rt_controller ur5e_hand_udp ur5e_tools \
          --cmake-args \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_C_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -DCMAKE_SHARED_LINKER_FLAGS="--coverage"

    - name: Run Tests
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        source install/setup.bash
        colcon test \
          --packages-select ur5e_rt_controller ur5e_hand_udp \
          --event-handlers console_cohesion+ \
          --return-code-on-test-failure

    - name: Show Test Results
      if: always()
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        colcon test-result --all --verbose || true

    - name: Generate Coverage Report
      if: always()
      run: |
        set -e

        # baseline 초기화 (모든 소스 파일 포함)
        lcov --capture --initial \
          --directory build/ur5e_rt_controller \
          --output-file coverage_base.info \
          --rc lcov_branch_coverage=1

        # 테스트 실행 후 실제 coverage 캡처
        lcov --capture \
          --directory build/ur5e_rt_controller \
          --output-file coverage_test.info \
          --rc lcov_branch_coverage=1

        # baseline과 테스트 coverage 병합
        lcov --add-tracefile coverage_base.info \
          --add-tracefile coverage_test.info \
          --output-file coverage_merged.info \
          --rc lcov_branch_coverage=1

        # 프로젝트 소스 코드만 추출 (--extract: 명시적 포함 방식)
        lcov --extract coverage_merged.info \
          '*/ur5e_rt_controller/include/*' \
          '*/ur5e_rt_controller/src/*' \
          '*/ur5e_rt_base/include/*' \
          '*/ur5e_hand_udp/include/*' \
          '*/ur5e_hand_udp/src/*' \
          --output-file coverage_extracted.info \
          --rc lcov_branch_coverage=1

        # 테스트 코드 자체는 제외
        lcov --remove coverage_extracted.info \
          '*/test/*' \
          --output-file coverage_filtered.info \
          --rc lcov_branch_coverage=1

        # coverage 요약 출력
        echo "=== Coverage Summary ==="
        lcov --list coverage_filtered.info --rc lcov_branch_coverage=1 || true

    - name: Upload Coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage_filtered.info
        flags: unittests-${{ matrix.ros_distro }}
        name: ur5e-rt-controller-${{ matrix.ros_distro }}
        fail_ci_if_error: false

    - name: Upload Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: colcon-logs-${{ matrix.ros_distro }}
        path: log/

  # ============================================================
  #  CodeQL Security Scan (humble only — 언어 분석이므로 distro 무관)
  # ============================================================
  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
    steps:
    - uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: cpp
        queries: security-extended

    - name: Setup ROS2
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: humble

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ros-humble-pinocchio \
          ros-humble-ur-robot-driver \
          ros-humble-realtime-tools

    - name: Build Packages
      run: |
        source /opt/ros/humble/setup.bash
        colcon build \
          --packages-up-to ur5e_rt_controller ur5e_hand_udp \
          --cmake-args -DCMAKE_BUILD_TYPE=Release

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  # ============================================================
  #  Clang-Tidy Analysis (distro matrix)
  # ============================================================
  clang-tidy:
    name: Clang-Tidy (${{ matrix.ros_distro }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            ros_distro: humble
          - os: ubuntu-24.04
            ros_distro: jazzy
      fail-fast: false
    steps:
    - uses: actions/checkout@v4

    - name: Setup ROS2 ${{ matrix.ros_distro }}
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: ${{ matrix.ros_distro }}

    # colcon 빌드 캐시 (build-test-coverage와 별도 키 — cmake args 다름)
    - name: Cache colcon workspace
      uses: actions/cache@v4
      with:
        path: |
          build/
          install/
        key: colcon-tidy-${{ matrix.ros_distro }}-${{ hashFiles('**/CMakeLists.txt', '**/package.xml') }}
        restore-keys: |
          colcon-tidy-${{ matrix.ros_distro }}-

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-tidy \
          ros-${{ matrix.ros_distro }}-pinocchio \
          ros-${{ matrix.ros_distro }}-ur-robot-driver \
          ros-${{ matrix.ros_distro }}-realtime-tools

    - name: Build with compile_commands.json
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        colcon build \
          --packages-up-to ur5e_rt_controller ur5e_hand_udp \
          --cmake-args \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_BUILD_TYPE=Debug

    - name: Merge compile_commands.json
      run: |
        # 모든 패키지의 compile_commands.json 병합
        python3 -c "
        import json, glob
        commands = []
        for f in glob.glob('build/*/compile_commands.json'):
            with open(f) as fh:
                commands.extend(json.load(fh))
        with open('compile_commands.json', 'w') as fh:
            json.dump(commands, fh, indent=2)
        "

    - name: Run clang-tidy
      run: |
        echo "=== Clang-Tidy Analysis ==="
        # run-clang-tidy: 병렬 실행으로 성능 향상
        run-clang-tidy -p . -quiet \
          'ur5e_rt_controller/src/.*\.cpp' \
          'ur5e_hand_udp/src/.*\.cpp' 2>&1 | \
          tee clang-tidy-output.txt || true

        # 경고/에러 요약
        echo ""
        echo "=== Summary ==="
        grep -c "warning:" clang-tidy-output.txt && echo "warnings found" || echo "No warnings"
        grep -c "error:" clang-tidy-output.txt && echo "errors found" || echo "No errors"

    - name: Upload clang-tidy Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: clang-tidy-report-${{ matrix.ros_distro }}
        path: clang-tidy-output.txt

  # ============================================================
  #  Claude Code Review (PR only)
  # ============================================================
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write       # OIDC 인증용
      contents: read        # 레포지토리 체크아웃용
      pull-requests: write  # PR 리뷰 코멘트 작성용
    steps:
    - uses: actions/checkout@v4

    - uses: anthropics/claude-code-action@v1
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
