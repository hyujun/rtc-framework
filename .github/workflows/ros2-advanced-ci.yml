name: ROS2 Humble Advanced CI
on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: C++ Linting
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        linter: [cpplint]
      fail-fast: false
    steps:
    - uses: actions/checkout@v4
      with:
        path: src/ur5e-rt-controller
    
    - name: Setup ROS2 Humble
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: humble
    
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          ros-humble-pinocchio \
          ros-humble-ur-robot-driver \
          ros-humble-realtime-tools
    
    - name: Run Linter
      uses: ros-tooling/action-ros-lint@v0.1
      with:
        linter: ${{ matrix.linter }}
        package-name: |
          ur5e_rt_base
          ur5e_rt_controller
          ur5e_hand_udp
        workspace-directory: src/ur5e-rt-controller

  build-test-coverage:
    name: Build, Test & Coverage
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Setup ROS2 Humble
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: humble

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          ros-humble-pinocchio \
          ros-humble-ur-robot-driver \
          ros-humble-ur-msgs \
          ros-humble-ur-description \
          ros-humble-realtime-tools \
          lcov

    - name: Build Packages (with coverage flags)
      run: |
        source /opt/ros/humble/setup.bash
        colcon build \
          --packages-select ur5e_rt_base ur5e_rt_controller ur5e_hand_udp ur5e_tools \
          --cmake-args \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

    - name: Run Tests
      run: |
        source /opt/ros/humble/setup.bash
        source install/setup.bash
        colcon test \
          --packages-select ur5e_rt_controller \
          --event-handlers console_cohesion+ \
          --return-code-on-test-failure

    - name: Show Test Results
      if: always()
      run: |
        source /opt/ros/humble/setup.bash
        colcon test-result --all --verbose || true

    - name: Generate Coverage Report
      if: always()
      run: |
        # baseline 초기화 (모든 소스 파일 포함, 실행되지 않은 파일도 0%로 표시)
        lcov --capture --initial \
          --directory build/ur5e_rt_controller \
          --output-file coverage_base.info \
          --rc lcov_branch_coverage=1 || true

        # 테스트 실행 후 실제 coverage 캡처
        lcov --capture \
          --directory build/ur5e_rt_controller \
          --output-file coverage_test.info \
          --rc lcov_branch_coverage=1 || true

        # baseline과 테스트 coverage 병합
        lcov --add-tracefile coverage_base.info \
          --add-tracefile coverage_test.info \
          --output-file coverage_merged.info \
          --rc lcov_branch_coverage=1 || true

        # 시스템 헤더, 테스트 코드, 외부 라이브러리 제외
        lcov --remove coverage_merged.info \
          '/usr/*' '/opt/*' '*/test/*' '*/build/*' '*/install/*' \
          --output-file coverage_filtered.info \
          --rc lcov_branch_coverage=1 || true

        # coverage 요약 출력
        lcov --list coverage_filtered.info --rc lcov_branch_coverage=1 || true

    - name: Upload Coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage_filtered.info
        flags: unittests
        name: ur5e-rt-controller
        fail_ci_if_error: false

    - name: Upload Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: colcon-logs
        path: log/

  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: cpp
        queries: security-extended
    
    - name: Setup ROS2
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: humble
    
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          ros-humble-pinocchio \
          ros-humble-ur-robot-driver \
          ros-humble-realtime-tools
    
    - name: Build Packages
      run: |
        source /opt/ros/humble/setup.bash
        colcon build \
          --packages-up-to ur5e_rt_controller \
          --cmake-args -DCMAKE_BUILD_TYPE=Release
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4

  performance:
    name: RT Performance Benchmark
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup ROS2
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: humble
    
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          ros-humble-pinocchio \
          ros-humble-ur-robot-driver \
          ros-humble-realtime-tools
    
    - name: Build Release
      run: |
        source /opt/ros/humble/setup.bash
        colcon build \
          --packages-up-to ur5e_rt_controller \
          --cmake-args \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-O3 -march=native -flto"
    
    - name: Run RT Benchmark
      continue-on-error: true
      run: |
        source install/setup.bash
        # 500Hz 루프 벤치마크 (fake_hardware 모드)
        # timeout으로 30초 후 종료 (exit 100은 정상)
        timeout 30s ros2 launch ur5e_rt_controller ur_control.launch.py \
          use_fake_hardware:=true \
          use_cpu_affinity:=false || true
        
        # 로그에서 지터 통계 추출
        if [ -d "log" ]; then
          find log -name "*.log" -exec grep -Hi "jitter\|latency\|control" {} \; || echo "No performance data found"
        fi
    
    - name: Upload Performance Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: perf-logs
        path: log/

  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write       # required for OIDC authentication by claude-code-action
      contents: read        # required to checkout the repository
      pull-requests: read   # required to read PR context
    steps:
    - uses: actions/checkout@v4

    - uses: anthropics/claude-code-action@v1
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
