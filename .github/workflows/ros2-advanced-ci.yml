name: ROS2 Advanced CI

# 전면 재작성: 2026-04-27 (agent_docs/ci-rewrite-plan.md)
# 핵심 변경:
#   - build-deps job: fmt 11 / mimalloc / aligator 사전 빌드 → cache + artifact
#     (이전 실패의 root cause 해결: rtc_mpc 의 find_package(fmt 10) 실패)
#   - claude-review job 제거 (D-1)
#   - 패키지 목록 SSoT: .github/ci-packages.yml
#   - composite actions 활용 (.github/actions/*)
#   - coverage upload 분리 (build 실패에 묶이지 않음)
#   - paths-ignore 에 agent_docs/** 추가

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'agent_docs/**'
      - '*.md'
      - 'rtc_scripts/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'agent_docs/**'
      - '*.md'
      - 'rtc_scripts/**'
      - 'LICENSE'
      - '.gitignore'

# 동일 브랜치 중복 실행 방지 — 새 push 시 이전 실행 자동 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ROS_DISTRO: jazzy
  # ros-tooling/setup-ros@v0.7 (latest 0.7.15) 는 아직 Node 20 사용 — 강제 Node 24
  # 으로 호환성 유지. 2026-06-02 부터 GitHub Actions 가 Node 24 강제 전환.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  #  Path filter — 후속 job 실행 여부 결정
  # ============================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      cpp: ${{ steps.filter.outputs.cpp }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cpp:
              - '**/*.hpp'
              - '**/*.cpp'
              - '**/*.h'
              - '**/CMakeLists.txt'
              - '**/package.xml'
              - '**/*.yaml'
              - '**/*.yml'
              - '**/*.xml'
              - '**/*.urdf'
              - '**/*.msg'
              - '**/*.srv'
              - '.github/actions/**'
              - '.github/ci-packages.yml'
              - 'deps.repos'
              - 'rtc_scripts/scripts/build_deps.sh'
            python:
              - 'rtc_tools/**/*.py'
              - 'rtc_digital_twin/**/*.py'
              - 'rtc_tools/setup.py'
              - 'rtc_tools/setup.cfg'
              - 'rtc_digital_twin/setup.py'
              - 'rtc_digital_twin/setup.cfg'
              - 'rtc_msgs/msg/*.msg'
              - 'rtc_msgs/srv/*.srv'

  # ============================================================
  #  Package list loader — .github/ci-packages.yml 을 4개 output 으로 노출
  # ============================================================
  packages:
    name: Load Package Lists
    runs-on: ubuntu-24.04
    outputs:
      build: ${{ steps.load.outputs.build }}
      test_cpp: ${{ steps.load.outputs.test_cpp }}
      test_python: ${{ steps.load.outputs.test_python }}
      lint_cpp: ${{ steps.load.outputs.lint_cpp }}
      coverage_paths: ${{ steps.load.outputs.coverage_paths }}
    steps:
      - uses: actions/checkout@v5
      - name: Parse ci-packages.yml
        id: load
        run: |
          set -eo pipefail
          # ubuntu-24.04 image 는 yq 4.x preinstalled
          BUILD=$(yq -r '.build | join(" ")' .github/ci-packages.yml)
          TEST_CPP=$(yq -r '.test_cpp | join(" ")' .github/ci-packages.yml)
          TEST_PY=$(yq -r '.test_python | join(" ")' .github/ci-packages.yml)
          LINT=$(yq -r '.lint_cpp | join(" ")' .github/ci-packages.yml)
          # coverage_paths: lcov --extract 의 다중 인자 — 한 줄에 공백 분리
          COV=$(yq -r '.coverage_paths | join(" ")' .github/ci-packages.yml)
          {
            echo "build=${BUILD}"
            echo "test_cpp=${TEST_CPP}"
            echo "test_python=${TEST_PY}"
            echo "lint_cpp=${LINT}"
            echo "coverage_paths=${COV}"
          } >> "$GITHUB_OUTPUT"
          echo "build=${BUILD}"
          echo "test_cpp=${TEST_CPP}"
          echo "test_python=${TEST_PY}"
          echo "lint_cpp=${LINT}"

  # ============================================================
  #  Build isolated deps — fmt 11 / mimalloc / aligator
  #  cache hit 시 skip, miss 시 ~15 min 빌드 후 artifact upload
  # ============================================================
  build-deps:
    name: Build Isolated Deps
    needs: [changes, packages]
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Setup environment
        uses: ./.github/actions/setup-rtc-env
        with:
          ros-distro: ${{ env.ROS_DISTRO }}
          apt-cache-version: deps-v1
          apt-packages: >-
            ros-jazzy-pinocchio
            ros-jazzy-hpp-fcl
            ros-jazzy-eigenpy
            ros-jazzy-proxsuite
            libeigen3-dev

      - name: Build & cache deps
        uses: ./.github/actions/build-isolated-deps
        with:
          ros-distro: ${{ env.ROS_DISTRO }}
          cache-version: v1

  # ============================================================
  #  C++ Lint (cppcheck) — deps 불요
  # ============================================================
  lint-cpp:
    name: C++ Lint (cppcheck)
    needs: [changes, packages]
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup environment
        uses: ./.github/actions/setup-rtc-env
        with:
          ros-distro: ${{ env.ROS_DISTRO }}
          apt-cache-version: lint-v1
          install-numpy: "false"
          apt-packages: >-
            ros-jazzy-pinocchio
            ros-jazzy-proxsuite
            ros-jazzy-behaviortree-cpp
            ros-jazzy-tinyxml2-vendor
            libyaml-cpp-dev
            libtinyxml2-dev
            libeigen3-dev

      - name: Run cppcheck
        env:
          AMENT_CPPCHECK_ALLOW_SLOW_VERSIONS: 1
          LINT_PACKAGES: ${{ needs.packages.outputs.lint_cpp }}
        run: |
          set -eo pipefail
          source /opt/ros/${{ env.ROS_DISTRO }}/setup.bash
          read -ra PACKAGES <<< "$LINT_PACKAGES"
          ERRORS=0
          for pkg in "${PACKAGES[@]}"; do
            [ -d "$pkg" ] || continue
            DIRS=""
            [ -d "$pkg/include" ] && DIRS="$DIRS $pkg/include"
            [ -d "$pkg/src" ] && DIRS="$DIRS $pkg/src"
            if [ -z "$DIRS" ]; then
              echo "=== $pkg: no include/ or src/ — skipped"
              continue
            fi
            echo "=== Checking $pkg ==="
            ament_cppcheck $DIRS || ERRORS=$((ERRORS + 1))
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::cppcheck found errors in $ERRORS package(s)"
            exit 1
          fi

  # ============================================================
  #  Python Tests (rtc_tools, rtc_digital_twin) — deps 불요
  # ============================================================
  python-test:
    name: Python Test
    needs: [changes, packages]
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup environment
        uses: ./.github/actions/setup-rtc-env
        with:
          ros-distro: ${{ env.ROS_DISTRO }}
          apt-cache-version: pytest-v1
          install-numpy: "false"

      - name: Install Python test dependencies
        run: pip install pytest pytest-cov coverage

      - name: Build Python packages
        uses: ./.github/actions/colcon-build
        with:
          packages: ${{ needs.packages.outputs.test_python }}
          ros-distro: ${{ env.ROS_DISTRO }}
          enable-testing: "true"
          artifact-suffix: pybuild

      - name: Run Python tests with coverage
        uses: ./.github/actions/colcon-test-report
        with:
          packages: ${{ needs.packages.outputs.test_python }}
          ros-distro: ${{ env.ROS_DISTRO }}
          pytest-args: "--cov=rtc_tools --cov=rtc_digital_twin --cov-report=xml:coverage.xml"
          summary-title: Python Test Results
          artifact-suffix: pytest

      - name: Collect Python coverage
        if: always()
        run: |
          find build/ -name 'coverage.xml' -print 2>/dev/null | head -5 || true
          if [ ! -f coverage.xml ]; then
            FIRST=$(find build/ -name 'coverage.xml' | head -1 || true)
            [ -n "$FIRST" ] && cp "$FIRST" coverage.xml || true
          fi

      - name: Upload Python coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: python
          name: rtc-framework-python
          fail_ci_if_error: false

  # ============================================================
  #  Build & Test (C++) — fmt 11 deps 사용
  # ============================================================
  build-test:
    name: Build & Test
    needs: [changes, packages, build-deps]
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Setup environment
        uses: ./.github/actions/setup-rtc-env
        with:
          ros-distro: ${{ env.ROS_DISTRO }}
          apt-cache-version: build-v1
          apt-packages: >-
            ros-jazzy-pinocchio
            ros-jazzy-proxsuite
            ros-jazzy-behaviortree-cpp
            ros-jazzy-xacro
            ros-jazzy-tinyxml2-vendor
            ros-jazzy-hpp-fcl
            ros-jazzy-eigenpy
            libyaml-cpp-dev
            libtinyxml2-dev
            libeigen3-dev
            lcov

      # rtc_tsid 테스트의 Panda URDF 참조 (/usr/local/share/example-robot-data/)
      - name: Install example-robot-data
        run: pip install example-robot-data

      - name: Download deps artifact
        uses: actions/download-artifact@v4
        with:
          name: rtc-deps-${{ env.ROS_DISTRO }}
          path: _rtc_ws/deps/install

      - name: Cache colcon workspace
        uses: actions/cache@v4
        with:
          path: |
            build/
            install/
          key: colcon-${{ env.ROS_DISTRO }}-build-v5-${{ hashFiles('**/CMakeLists.txt', '**/package.xml', '**/*.hpp', '**/*.cpp') }}
          restore-keys: |
            colcon-${{ env.ROS_DISTRO }}-build-v5-

      - name: Build packages with coverage
        uses: ./.github/actions/colcon-build
        with:
          packages: ${{ needs.packages.outputs.build }}
          ros-distro: ${{ env.ROS_DISTRO }}
          deps-install-path: ${{ github.workspace }}/_rtc_ws/deps/install
          build-type: RelWithDebInfo
          enable-coverage: "true"
          artifact-suffix: cpp-build

      - name: Run C++ tests
        uses: ./.github/actions/colcon-test-report
        with:
          packages: ${{ needs.packages.outputs.test_cpp }}
          ros-distro: ${{ env.ROS_DISTRO }}
          deps-install-path: ${{ github.workspace }}/_rtc_ws/deps/install
          summary-title: C++ Test Results
          artifact-suffix: cpp-test

      # Coverage 는 build/test 모두 성공한 경우에만 의미 있음.
      # if: success() 로 이전 step 실패 시 skip. lcov 자체 실패는 job 을 망가뜨리지 않음.
      - name: Generate coverage report
        if: success()
        continue-on-error: true
        env:
          TEST_PACKAGES: ${{ needs.packages.outputs.test_cpp }}
          COVERAGE_PATHS: ${{ needs.packages.outputs.coverage_paths }}
        run: |
          set -eo pipefail
          if [ ! -d build ]; then
            echo "::warning::No build/ directory — skipping coverage"
            exit 0
          fi

          # Ubuntu 24.04 → lcov 2.x
          LCOV_MAJOR=$(lcov --version | grep -oP '\d+' | head -1)
          BRANCH_RC="--rc branch_coverage=1"
          LCOV_IGNORE="--ignore-errors unused,mismatch"
          if [ "$LCOV_MAJOR" -lt 2 ]; then
            BRANCH_RC="--rc lcov_branch_coverage=1"
            LCOV_IGNORE=""
          fi

          DIRS=""
          # shellcheck disable=SC2086
          for pkg in $TEST_PACKAGES; do
            [ -d "build/$pkg" ] && DIRS="$DIRS --directory build/$pkg"
          done
          if [ -z "$DIRS" ]; then
            echo "::warning::No build directories — skipping coverage"
            exit 0
          fi

          # shellcheck disable=SC2086
          lcov --capture $DIRS --output-file coverage_merged.info $BRANCH_RC $LCOV_IGNORE

          # SSoT 의 coverage_paths 글로브 (`*/rtc_base/include/*` 등) 를 lcov --extract 로 전달.
          # shell 이 cwd 에서 wildcard expand 하지 않도록 set -f (noglob) 로 보호.
          set -f
          # shellcheck disable=SC2086
          lcov --extract coverage_merged.info $COVERAGE_PATHS \
            --output-file coverage_extracted.info $BRANCH_RC $LCOV_IGNORE
          set +f

          # 테스트 코드 자체 제외
          lcov --remove coverage_extracted.info \
            '*/test/*' '*/examples/*' \
            --output-file coverage_filtered.info $BRANCH_RC $LCOV_IGNORE

          echo "=== Coverage Summary ==="
          lcov --list coverage_filtered.info $BRANCH_RC || true

      - name: Upload coverage to Codecov
        if: success()
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage_filtered.info
          flags: cpp
          name: rtc-framework-cpp
          fail_ci_if_error: false

  # ============================================================
  #  Clang-Tidy — fmt 11 deps 사용, BUILD_TESTING=OFF
  # ============================================================
  clang-tidy:
    name: Clang-Tidy
    needs: [changes, packages, build-deps]
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Setup environment (tooling only)
        uses: ./.github/actions/setup-rtc-env
        with:
          ros-distro: ${{ env.ROS_DISTRO }}
          install-ros: "false"
          apt-cache-version: tidy-v1
          apt-packages: >-
            clang-tidy
            ros-jazzy-ros-base
            ros-jazzy-visualization-msgs
            ros-jazzy-std-srvs
            ros-jazzy-pinocchio
            ros-jazzy-proxsuite
            ros-jazzy-behaviortree-cpp
            ros-jazzy-tinyxml2-vendor
            ros-jazzy-hpp-fcl
            ros-jazzy-eigenpy
            libyaml-cpp-dev
            libtinyxml2-dev
            libeigen3-dev

      - name: Download deps artifact
        uses: actions/download-artifact@v4
        with:
          name: rtc-deps-${{ env.ROS_DISTRO }}
          path: _rtc_ws/deps/install

      - name: Cache colcon workspace
        uses: actions/cache@v4
        with:
          path: |
            build/
            install/
          key: colcon-${{ env.ROS_DISTRO }}-tidy-v2-${{ hashFiles('**/CMakeLists.txt', '**/package.xml') }}
          restore-keys: |
            colcon-${{ env.ROS_DISTRO }}-tidy-v2-

      - name: Build packages
        uses: ./.github/actions/colcon-build
        with:
          packages: ${{ needs.packages.outputs.build }}
          ros-distro: ${{ env.ROS_DISTRO }}
          deps-install-path: ${{ github.workspace }}/_rtc_ws/deps/install
          build-type: Debug
          enable-testing: "false"
          export-compile-commands: "true"
          artifact-suffix: tidy-build

      - name: Merge compile_commands.json
        run: |
          python3 -c "
          import json, glob
          commands = []
          for f in glob.glob('build/*/compile_commands.json'):
              with open(f) as fh:
                  commands.extend(json.load(fh))
          with open('compile_commands.json', 'w') as fh:
              json.dump(commands, fh, indent=2)
          print(f'Merged {len(commands)} entries')
          "

      - name: Run clang-tidy
        run: |
          run-clang-tidy -p . -quiet \
            'rtc_controller_interface/src/.*\.cpp' \
            'rtc_controller_manager/src/.*\.cpp' \
            'rtc_controllers/src/.*\.cpp' \
            'rtc_tsid/src/.*\.cpp' \
            'rtc_urdf_bridge/src/.*\.cpp' \
            'ur5e_bringup/src/.*\.cpp' \
            'ur5e_bt_coordinator/src/.*\.cpp' \
            'ur5e_hand_driver/src/.*\.cpp' \
            'shape_estimation/src/.*\.cpp' 2>&1 | \
            tee clang-tidy-output.txt || true

          WARNINGS=$(grep -c "warning:" clang-tidy-output.txt || true)
          ERRORS=$(grep -c "error:" clang-tidy-output.txt || true)
          {
            echo "## Clang-Tidy Results"
            echo "- **Warnings**: $WARNINGS"
            echo "- **Errors**: $ERRORS"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload clang-tidy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-output.txt

  # ============================================================
  #  CodeQL Security Scan — main push 시에만, fmt 11 deps 사용
  # ============================================================
  codeql:
    name: CodeQL Security Scan
    needs: [changes, packages, build-deps]
    if: github.event_name == 'push' && needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      security-events: write
    env:
      CCACHE_COMPILERCHECK: content
      CCACHE_MAXSIZE: 2G
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Setup environment
        uses: ./.github/actions/setup-rtc-env
        with:
          ros-distro: ${{ env.ROS_DISTRO }}
          apt-cache-version: codeql-v1
          apt-packages: >-
            ros-jazzy-pinocchio
            ros-jazzy-proxsuite
            ros-jazzy-behaviortree-cpp
            ros-jazzy-tinyxml2-vendor
            ros-jazzy-hpp-fcl
            ros-jazzy-eigenpy
            libyaml-cpp-dev
            libtinyxml2-dev
            libeigen3-dev

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: codeql-jazzy
          max-size: 2G

      - name: Download deps artifact
        uses: actions/download-artifact@v4
        with:
          name: rtc-deps-${{ env.ROS_DISTRO }}
          path: _rtc_ws/deps/install

      - name: Cache colcon workspace
        uses: actions/cache@v4
        with:
          path: |
            build/
            install/
          key: colcon-${{ env.ROS_DISTRO }}-codeql-v2-${{ hashFiles('**/CMakeLists.txt', '**/package.xml') }}
          restore-keys: |
            colcon-${{ env.ROS_DISTRO }}-codeql-v2-

      # CodeQL instrumentation + colcon 빌드 조합이 hosted runner (7GB RAM) 초과 →
      # OOM 방지용 swap. fallocate Text-file-busy 회피: guard + dd fallback.
      - name: Add swap space
        run: |
          if [ ! -f /swapfile ]; then
            sudo dd if=/dev/zero of=/swapfile bs=1M count=4096 status=none
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi
          free -h

      - name: Build packages
        uses: ./.github/actions/colcon-build
        with:
          packages: ${{ needs.packages.outputs.build }}
          ros-distro: ${{ env.ROS_DISTRO }}
          deps-install-path: ${{ github.workspace }}/_rtc_ws/deps/install
          build-type: Release
          enable-testing: "false"
          parallel-workers: "1"
          extra-cmake-args: "-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
          artifact-suffix: codeql-build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:cpp"
