name: ROS2 Advanced CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'rtc_scripts/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'rtc_scripts/**'
      - 'LICENSE'
      - '.gitignore'

# 동일 브랜치 중복 실행 방지 — 새 push 시 이전 실행 자동 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # 모든 job에서 공유하는 패키지 목록
  CI_PACKAGES: >-
    rtc_controller_manager
    rtc_controllers
    ur5e_bringup
    ur5e_hand_driver
    urdf_pinocchio_bridge
    shape_estimation
  TEST_PACKAGES: >-
    rtc_controllers
    urdf_pinocchio_bridge
    shape_estimation
  PYTHON_TEST_PACKAGES: >-
    rtc_tools
    rtc_digital_twin

jobs:
  # ============================================================
  #  변경 감지 — 후속 job 실행 여부 결정
  # ============================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      cpp: ${{ steps.filter.outputs.cpp }}
      python: ${{ steps.filter.outputs.python }}
      urdf: ${{ steps.filter.outputs.urdf }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          cpp:
            - '**/*.hpp'
            - '**/*.cpp'
            - '**/*.h'
            - '**/CMakeLists.txt'
            - '**/package.xml'
            - '**/*.yaml'
            - '**/*.yml'
            - '**/*.xml'
            - '**/*.urdf'
            - '**/*.msg'
            - '**/*.srv'
          python:
            - 'rtc_tools/**/*.py'
            - 'rtc_digital_twin/**/*.py'
          urdf:
            - 'ur5e_description/**/*.urdf'
            - 'ur5e_description/**/*.xacro'
            - 'ur5e_description/**/*.xml'

  # ============================================================
  #  C++ Linting (cppcheck only — clang-tidy가 상위 호환)
  #  cpplint 제거: clang-tidy의 readability/modernize/bugprone가
  #  cpplint 검사 범위를 포함하며, CPPLINT.cfg에서 이미 6개 필터 비활성화
  # ============================================================
  lint-cpp:
    name: C++ Lint (cppcheck, ${{ matrix.ros_distro }})
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            ros_distro: humble
          - os: ubuntu-24.04
            ros_distro: jazzy
      fail-fast: false
    steps:
    - uses: actions/checkout@v4
      with:
        path: src/rtc-framework

    - name: Setup ROS2 ${{ matrix.ros_distro }}
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: ${{ matrix.ros_distro }}

    - name: Cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: >-
          ros-${{ matrix.ros_distro }}-pinocchio
          ros-${{ matrix.ros_distro }}-tinyxml2-vendor
          libyaml-cpp-dev
          libtinyxml2-dev
          libeigen3-dev
        version: ${{ matrix.ros_distro }}-lint-v2

    - name: Run cppcheck
      uses: ros-tooling/action-ros-lint@v0.1
      with:
        linter: cppcheck
        package-name: |
          rtc_base
          rtc_communication
          rtc_controller_interface
          rtc_controller_manager
          rtc_controllers
          rtc_inference
          rtc_msgs
          urdf_pinocchio_bridge
          ur5e_bringup
          ur5e_hand_driver
        workspace-directory: src/rtc-framework
      env:
        # Ubuntu 24.04의 cppcheck 2.13.0 성능 이슈 차단 우회
        AMENT_CPPCHECK_ALLOW_SLOW_VERSIONS: 1
        # GTest TEST() 매크로를 파싱하지 못하는 cppcheck syntaxError 억제
        AMENT_CPPCHECK_ADDITIONAL_ARGS: --suppress=syntaxError:*test*

  # ============================================================
  #  Python Tests (rtc_tools, rtc_digital_twin)
  # ============================================================
  python-test:
    name: Python Test (${{ matrix.ros_distro }})
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            ros_distro: humble
          - os: ubuntu-24.04
            ros_distro: jazzy
      fail-fast: false
    steps:
    - uses: actions/checkout@v4

    - name: Setup ROS2 ${{ matrix.ros_distro }}
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: ${{ matrix.ros_distro }}

    - name: Upgrade colcon
      run: pip install -U colcon-cmake colcon-core

    - name: Install Python test dependencies
      run: pip install pytest

    - name: Build Python packages
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        colcon build \
          --packages-select $PYTHON_TEST_PACKAGES \
          --packages-up-to $PYTHON_TEST_PACKAGES

    - name: Run Python tests
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        source install/setup.bash
        colcon test \
          --packages-select $PYTHON_TEST_PACKAGES \
          --event-handlers console_cohesion+ \
          --return-code-on-test-failure

    - name: Show Test Results
      if: always()
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        colcon test-result --all --verbose || true

  # ============================================================
  #  URDF Validation (check_urdf + xacro processing)
  # ============================================================
  urdf-validation:
    name: URDF Validation
    needs: changes
    if: needs.changes.outputs.urdf == 'true' || needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4

    - name: Setup ROS2
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: jazzy

    - name: Install URDF tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ros-jazzy-xacro \
          ros-jazzy-urdf \
          liburdfdom-tools

    - name: Validate pre-built URDF files
      run: |
        source /opt/ros/jazzy/setup.bash
        echo "=== Validating ur5e.urdf ==="
        check_urdf ur5e_description/robots/ur5e/urdf/ur5e.urdf

        echo ""
        echo "=== Validating ur5e_with_hand.urdf ==="
        check_urdf ur5e_description/robots/ur5e/urdf/ur5e_with_hand.urdf

    - name: Build ur5e_description (ament package registration)
      run: |
        source /opt/ros/jazzy/setup.bash
        pip install -U colcon-cmake colcon-core
        colcon build --packages-select ur5e_description

    - name: Validate xacro → URDF pipeline
      run: |
        source /opt/ros/jazzy/setup.bash
        source install/setup.bash

        echo "=== Processing ur5e_with_hand.urdf.xacro ==="
        xacro ur5e_description/robots/ur5e/urdf/ur5e_with_hand.urdf.xacro \
          -o /tmp/ur5e_with_hand_generated.urdf

        echo "=== Validating generated URDF ==="
        check_urdf /tmp/ur5e_with_hand_generated.urdf

    - name: Check URDF consistency (xacro output vs committed file)
      run: |
        # xacro 출력과 커밋된 URDF의 구조적 일관성 검증
        # (공백/주석 차이 무시, 링크/조인트 수 비교)
        COMMITTED=$(grep -c '<joint' ur5e_description/robots/ur5e/urdf/ur5e_with_hand.urdf || true)
        GENERATED=$(grep -c '<joint' /tmp/ur5e_with_hand_generated.urdf || true)
        echo "Committed URDF joints: $COMMITTED"
        echo "Generated URDF joints: $GENERATED"
        if [ "$COMMITTED" != "$GENERATED" ]; then
          echo "::warning::Joint count mismatch — committed ($COMMITTED) vs generated ($GENERATED). Consider regenerating ur5e_with_hand.urdf"
        fi

  # ============================================================
  #  Build, Test & Coverage (distro matrix)
  #  + compile_commands.json을 artifact로 공유 → clang-tidy 재사용
  # ============================================================
  build-test-coverage:
    name: Build & Test (${{ matrix.ros_distro }})
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            ros_distro: humble
          - os: ubuntu-24.04
            ros_distro: jazzy
      fail-fast: false
    steps:
    - uses: actions/checkout@v4

    - name: Setup ROS2 ${{ matrix.ros_distro }}
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: ${{ matrix.ros_distro }}

    # setup-ros의 colcon이 다수 의존성 시 CMAKE_PREFIX_PATH 구분자를
    # 세미콜론(;)으로 설정하는 버그 수정 — pip으로 최신 버전 설치
    - name: Upgrade colcon
      run: pip install -U colcon-cmake colcon-core

    # colcon 빌드 캐시
    - name: Cache colcon workspace
      uses: actions/cache@v4
      with:
        path: |
          build/
          install/
        key: colcon-${{ matrix.ros_distro }}-${{ hashFiles('**/CMakeLists.txt', '**/package.xml') }}
        restore-keys: |
          colcon-${{ matrix.ros_distro }}-

    - name: Cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: >-
          ros-${{ matrix.ros_distro }}-pinocchio
          ros-${{ matrix.ros_distro }}-xacro
          ros-${{ matrix.ros_distro }}-tinyxml2-vendor
          libyaml-cpp-dev
          libtinyxml2-dev
          libeigen3-dev
          lcov
        version: ${{ matrix.ros_distro }}-build-v3

    - name: Build Packages (with coverage + compile_commands)
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        # MuJoCo/BT/ONNX 패키지 제외 (CI에 해당 라이브러리 미설치)
        colcon build \
          --packages-up-to $CI_PACKAGES \
          --cmake-args \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            '-DCMAKE_CXX_FLAGS=--coverage -fprofile-arcs -ftest-coverage' \
            '-DCMAKE_C_FLAGS=--coverage' \
            '-DCMAKE_EXE_LINKER_FLAGS=--coverage' \
            '-DCMAKE_SHARED_LINKER_FLAGS=--coverage'

    - name: Merge & upload compile_commands.json
      run: |
        python3 -c "
        import json, glob
        commands = []
        for f in glob.glob('build/*/compile_commands.json'):
            with open(f) as fh:
                commands.extend(json.load(fh))
        with open('compile_commands.json', 'w') as fh:
            json.dump(commands, fh, indent=2)
        "

    - name: Upload compile_commands.json
      uses: actions/upload-artifact@v4
      with:
        name: compile-commands-${{ matrix.ros_distro }}
        path: compile_commands.json
        retention-days: 1

    - name: Run Tests
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        source install/setup.bash
        colcon test \
          --packages-select $TEST_PACKAGES \
          --event-handlers console_cohesion+ \
          --return-code-on-test-failure

    - name: Show Test Results
      if: always()
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        colcon test-result --all --verbose || true

    - name: Generate Coverage Report
      if: always()
      run: |
        # 빌드 실패 시 coverage 디렉토리가 없으면 skip
        if [ ! -d "build/rtc_controllers" ] && [ ! -d "build/urdf_pinocchio_bridge" ]; then
          echo "::warning::build directories not found — skipping coverage"
          exit 0
        fi

        set -e

        # lcov 버전 감지 (Ubuntu 22.04: 1.x, Ubuntu 24.04: 2.x)
        LCOV_MAJOR=$(lcov --version | grep -oP '\d+' | head -1)
        if [ "$LCOV_MAJOR" -ge 2 ]; then
          BRANCH_RC="--rc branch_coverage=1"
          LCOV_IGNORE="--ignore-errors unused,mismatch"
        else
          BRANCH_RC="--rc lcov_branch_coverage=1"
          LCOV_IGNORE=""
        fi

        # 테스트가 있는 패키지별로 coverage 수집
        COVERAGE_DIRS=""
        for pkg in rtc_controllers urdf_pinocchio_bridge shape_estimation; do
          if [ -d "build/$pkg" ]; then
            COVERAGE_DIRS="$COVERAGE_DIRS --directory build/$pkg"
          fi
        done

        if [ "$LCOV_MAJOR" -ge 2 ]; then
          # lcov 2.x: --initial 제거됨, --capture만 사용
          lcov --capture \
            $COVERAGE_DIRS \
            --output-file coverage_merged.info \
            $BRANCH_RC \
            $LCOV_IGNORE
        else
          # lcov 1.x: baseline + test coverage 병합
          lcov --capture --initial \
            $COVERAGE_DIRS \
            --output-file coverage_base.info \
            $BRANCH_RC

          lcov --capture \
            $COVERAGE_DIRS \
            --output-file coverage_test.info \
            $BRANCH_RC

          lcov --add-tracefile coverage_base.info \
            --add-tracefile coverage_test.info \
            --output-file coverage_merged.info \
            $BRANCH_RC
        fi

        # 프로젝트 소스 코드만 추출
        lcov --extract coverage_merged.info \
          '*/rtc_base/include/*' \
          '*/rtc_communication/include/*' \
          '*/rtc_controller_interface/include/*' \
          '*/rtc_controller_interface/src/*' \
          '*/rtc_controller_manager/src/*' \
          '*/rtc_controllers/include/*' \
          '*/rtc_controllers/src/*' \
          '*/rtc_inference/include/*' \
          '*/urdf_pinocchio_bridge/include/*' \
          '*/urdf_pinocchio_bridge/src/*' \
          '*/ur5e_bringup/include/*' \
          '*/ur5e_bringup/src/*' \
          '*/ur5e_hand_driver/include/*' \
          '*/ur5e_hand_driver/src/*' \
          '*/shape_estimation/include/*' \
          '*/shape_estimation/src/*' \
          --output-file coverage_extracted.info \
          $BRANCH_RC \
          $LCOV_IGNORE

        # 테스트 코드 자체는 제외
        lcov --remove coverage_extracted.info \
          '*/test/*' \
          '*/examples/*' \
          --output-file coverage_filtered.info \
          $BRANCH_RC \
          $LCOV_IGNORE

        # coverage 요약 출력
        echo "=== Coverage Summary ==="
        lcov --list coverage_filtered.info $BRANCH_RC || true

    - name: Upload Coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage_filtered.info
        flags: unittests-${{ matrix.ros_distro }}
        name: rtc-framework-${{ matrix.ros_distro }}
        fail_ci_if_error: false

    - name: Upload Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: colcon-logs-${{ matrix.ros_distro }}
        path: log/

  # ============================================================
  #  CodeQL Security Scan — main push만 (PR 제외)
  # ============================================================
  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-22.04
    if: github.event_name == 'push'
    permissions:
      security-events: write
    steps:
    - uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: cpp
        queries: security-extended

    - name: Setup ROS2
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: humble

    - name: Upgrade colcon
      run: pip install -U colcon-cmake colcon-core

    - name: Cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: >-
          ros-humble-pinocchio
          ros-humble-tinyxml2-vendor
          libyaml-cpp-dev
          libtinyxml2-dev
          libeigen3-dev
        version: humble-codeql-v2

    - name: Build Packages
      run: |
        source /opt/ros/humble/setup.bash
        colcon build \
          --packages-up-to $CI_PACKAGES \
          --cmake-args \
            -DCMAKE_BUILD_TYPE=Release

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  # ============================================================
  #  Clang-Tidy Analysis — jazzy 1회만 (정적 분석은 distro 무관)
  #  build-test의 compile_commands.json 재사용
  # ============================================================
  clang-tidy:
    name: Clang-Tidy
    needs: [changes, build-test-coverage]
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4

    - name: Setup ROS2 Jazzy
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: jazzy

    - name: Upgrade colcon
      run: pip install -U colcon-cmake colcon-core

    # build-test-coverage와 동일 빌드 캐시 공유 (같은 키)
    - name: Cache colcon workspace
      uses: actions/cache@v4
      with:
        path: |
          build/
          install/
        key: colcon-jazzy-${{ hashFiles('**/CMakeLists.txt', '**/package.xml') }}
        restore-keys: |
          colcon-jazzy-

    - name: Cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: >-
          clang-tidy
          ros-jazzy-pinocchio
          ros-jazzy-tinyxml2-vendor
          libyaml-cpp-dev
          libtinyxml2-dev
          libeigen3-dev
        version: jazzy-tidy-v2

    - name: Download compile_commands.json
      uses: actions/download-artifact@v4
      with:
        name: compile-commands-jazzy

    # 캐시 miss 시에만 빌드 (캐시 hit → build/ 이미 존재)
    - name: Build (cache miss fallback)
      run: |
        if [ ! -d "build" ] || [ -z "$(ls -A build/ 2>/dev/null)" ]; then
          echo "Cache miss — rebuilding"
          source /opt/ros/jazzy/setup.bash
          colcon build \
            --packages-up-to $CI_PACKAGES \
            --cmake-args \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DCMAKE_BUILD_TYPE=Debug
        else
          echo "Cache hit — skipping build"
        fi

    - name: Run clang-tidy
      run: |
        echo "=== Clang-Tidy Analysis ==="
        # run-clang-tidy: 병렬 실행으로 성능 향상
        run-clang-tidy -p . -quiet \
          'rtc_controller_interface/src/.*\.cpp' \
          'rtc_controller_manager/src/.*\.cpp' \
          'rtc_controllers/src/.*\.cpp' \
          'urdf_pinocchio_bridge/src/.*\.cpp' \
          'ur5e_bringup/src/.*\.cpp' \
          'ur5e_hand_driver/src/.*\.cpp' \
          'shape_estimation/src/.*\.cpp' 2>&1 | \
          tee clang-tidy-output.txt || true

        # 경고/에러 요약
        echo ""
        echo "=== Summary ==="
        grep -c "warning:" clang-tidy-output.txt && echo "warnings found" || echo "No warnings"
        grep -c "error:" clang-tidy-output.txt && echo "errors found" || echo "No errors"

    - name: Upload clang-tidy Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: clang-tidy-report
        path: clang-tidy-output.txt

  # ============================================================
  #  Claude Code Review (PR only)
  # ============================================================
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write       # OIDC 인증용
      contents: read        # 레포지토리 체크아웃용
      pull-requests: write  # PR 리뷰 코멘트 작성용
    steps:
    - uses: actions/checkout@v4

    - uses: anthropics/claude-code-action@v1
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
