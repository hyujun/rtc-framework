name: ROS2 Humble Advanced CI
on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

env:
  ROS_DISTRO: humble

jobs:
  lint-cpp:
    name: C++ Linting
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        linter: [cpplint]
      fail-fast: false
    steps:
    - uses: actions/checkout@v4
      with:
        path: src/ur5e-rt-controller

    - name: Setup ROS2 Humble
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: humble

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ros-humble-pinocchio \
          ros-humble-ur-robot-driver \
          ros-humble-realtime-tools

    - name: Run Linter
      uses: ros-tooling/action-ros-lint@v0.1
      with:
        linter: ${{ matrix.linter }}
        package-name: |
          ur5e_rt_base
          ur5e_rt_controller
          ur5e_hand_udp
        workspace-directory: src/ur5e-rt-controller

  build-test-coverage:
    name: Build, Test & Coverage
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Setup ROS2 Humble
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: humble

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ros-humble-pinocchio \
          ros-humble-ur-robot-driver \
          ros-humble-ur-msgs \
          ros-humble-ur-description \
          ros-humble-realtime-tools \
          lcov

    - name: Build Packages (with coverage flags)
      run: |
        source /opt/ros/humble/setup.bash
        # --packages-up-to: ur5e_description 등 의존성 자동 해결
        colcon build \
          --packages-up-to ur5e_rt_controller ur5e_hand_udp ur5e_tools \
          --cmake-args \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_C_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -DCMAKE_SHARED_LINKER_FLAGS="--coverage"

    - name: Run Tests
      run: |
        source /opt/ros/humble/setup.bash
        source install/setup.bash
        colcon test \
          --packages-select ur5e_rt_controller \
          --event-handlers console_cohesion+ \
          --return-code-on-test-failure

    - name: Show Test Results
      if: always()
      run: |
        source /opt/ros/humble/setup.bash
        colcon test-result --all --verbose || true

    - name: Generate Coverage Report
      if: always()
      run: |
        # baseline 초기화 (모든 소스 파일 포함)
        lcov --capture --initial \
          --directory build/ur5e_rt_controller \
          --output-file coverage_base.info \
          --rc lcov_branch_coverage=1 || true

        # 테스트 실행 후 실제 coverage 캡처
        lcov --capture \
          --directory build/ur5e_rt_controller \
          --output-file coverage_test.info \
          --rc lcov_branch_coverage=1 || true

        # baseline과 테스트 coverage 병합
        lcov --add-tracefile coverage_base.info \
          --add-tracefile coverage_test.info \
          --output-file coverage_merged.info \
          --rc lcov_branch_coverage=1 || true

        # 프로젝트 소스 코드만 추출 (--extract: 명시적 포함 방식)
        # --remove '*/build/*' 대신 --extract 사용 → 빌드 경로 문제 해결
        lcov --extract coverage_merged.info \
          '*/ur5e_rt_controller/include/*' \
          '*/ur5e_rt_controller/src/*' \
          '*/ur5e_rt_base/include/*' \
          '*/ur5e_hand_udp/include/*' \
          '*/ur5e_hand_udp/src/*' \
          --output-file coverage_extracted.info \
          --rc lcov_branch_coverage=1 || true

        # 테스트 코드 자체는 제외
        lcov --remove coverage_extracted.info \
          '*/test/*' \
          --output-file coverage_filtered.info \
          --rc lcov_branch_coverage=1 || true

        # coverage 요약 출력
        echo "=== Coverage Summary ==="
        lcov --list coverage_filtered.info --rc lcov_branch_coverage=1 || true

    - name: Upload Coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage_filtered.info
        flags: unittests
        name: ur5e-rt-controller
        fail_ci_if_error: false

    - name: Upload Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: colcon-logs
        path: log/

  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
    steps:
    - uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: cpp
        queries: security-extended

    - name: Setup ROS2
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: humble

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ros-humble-pinocchio \
          ros-humble-ur-robot-driver \
          ros-humble-realtime-tools

    - name: Build Packages
      run: |
        source /opt/ros/humble/setup.bash
        colcon build \
          --packages-up-to ur5e_rt_controller ur5e_hand_udp \
          --cmake-args -DCMAKE_BUILD_TYPE=Release

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  clang-tidy:
    name: Clang-Tidy Analysis
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4

    - name: Setup ROS2
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: humble

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-tidy \
          ros-humble-pinocchio \
          ros-humble-ur-robot-driver \
          ros-humble-realtime-tools

    - name: Build with compile_commands.json
      run: |
        source /opt/ros/humble/setup.bash
        colcon build \
          --packages-up-to ur5e_rt_controller ur5e_hand_udp \
          --cmake-args \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_BUILD_TYPE=Debug

    - name: Merge compile_commands.json
      run: |
        # 모든 패키지의 compile_commands.json 병합
        python3 -c "
        import json, glob
        commands = []
        for f in glob.glob('build/*/compile_commands.json'):
            with open(f) as fh:
                commands.extend(json.load(fh))
        with open('compile_commands.json', 'w') as fh:
            json.dump(commands, fh, indent=2)
        "

    - name: Run clang-tidy
      run: |
        echo "=== Clang-Tidy Analysis ==="
        # C++ 소스 파일에 대해 clang-tidy 실행 (non-blocking)
        find ur5e_rt_controller/src ur5e_hand_udp/src \
          -name '*.cpp' -print0 | \
          xargs -0 -n1 clang-tidy -p . --quiet 2>&1 | \
          tee clang-tidy-output.txt || true

        # 경고/에러 요약
        echo ""
        echo "=== Summary ==="
        grep -c "warning:" clang-tidy-output.txt && echo "warnings found" || echo "No warnings"
        grep -c "error:" clang-tidy-output.txt && echo "errors found" || echo "No errors"

    - name: Upload clang-tidy Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: clang-tidy-report
        path: clang-tidy-output.txt

  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write       # OIDC 인증용
      contents: read        # 레포지토리 체크아웃용
      pull-requests: read   # PR 컨텍스트 읽기용
    steps:
    - uses: actions/checkout@v4

    - uses: anthropics/claude-code-action@v1
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
