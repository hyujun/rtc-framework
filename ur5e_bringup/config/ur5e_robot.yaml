# ur5e_robot.yaml — UR5e-specific robot parameters
# Extracted from ur5e_rt_controller.yaml for the ur5e_bringup package.
/**:
  ros__parameters:
    # ── Control rate ──────────────────────────────────────────────────────────
    control_rate: 500.0              # Hz

    # ── Device activation (global defaults) ───────────────────────────────────
    enable_ur5e: true
    enable_hand: false

    # ── Initial controller ────────────────────────────────────────────────────
    initial_controller: "demo_joint_controller"

    # ── Initialization timeout ────────────────────────────────────────────────
    init_timeout_sec: 30.0

    # ── Auto-hold position ────────────────────────────────────────────────────
    auto_hold_position: true

    # ── JointCommand topic (MuJoCo / external simulator) ──────────────────────
    joint_command_topic: "/ur5e/joint_command"

    # ── Hand simulation (MuJoCo fake response) ───────────────────────────────
    hand_sim_enabled: false
    hand_command_topic: "/hand/command"
    hand_state_topic: "/hand/joint_states"

    # ── E-STOP ────────────────────────────────────────────────────────────────
    enable_estop: true
    robot_timeout_ms: 100.0
    hand_timeout_ms: 200.0

    # ── Logging ───────────────────────────────────────────────────────────────
    enable_logging: true
    enable_timing_log: true
    enable_robot_log: true
    enable_hand_log: true
    log_dir: ""
    max_log_sessions: 10

    # ── Joint names ───────────────────────────────────────────────────────────
    robot_joint_names:
      - "shoulder_pan_joint"
      - "shoulder_lift_joint"
      - "elbow_joint"
      - "wrist_1_joint"
      - "wrist_2_joint"
      - "wrist_3_joint"

    # ── Joint limits ──────────────────────────────────────────────────────────
    joint_limits:
      max_velocity: 2.0
      max_acceleration: 5.0
      position_limits:
        joint_0: [-6.28, 6.28]
        joint_1: [-6.28, 6.28]
        joint_2: [-3.14, 3.14]
        joint_3: [-6.28, 6.28]
        joint_4: [-6.28, 6.28]
        joint_5: [-6.28, 6.28]

    # ── Status Monitor ────────────────────────────────────────────────────────
    enable_status_monitor: false
