# ur5e_robot.yaml — UR5e-specific configuration for RTC framework
# ROS2 Humble / Jazzy compatible flat parameter structure
/**:
  ros__parameters:
    # ── Control rate ──────────────────────────────────────────────────────────
    control_rate: 500.0              # Hz — timer period = 1e6/rate us

    # ── Initial controller ────────────────────────────────────────────────────
    initial_controller: "demo_joint_controller"

    # ── Initialization timeout ────────────────────────────────────────────────
    init_timeout_sec: 30.0           # E-STOP + shutdown if no robot/target data (sec)

    # ── Auto-hold position ────────────────────────────────────────────────────
    auto_hold_position: true         # Auto-target current position when no external goal

    # ── E-STOP configuration ─────────────────────────────────────────────────
    enable_estop: true               # E-STOP timeout monitoring
    # device_timeouts: matches topics group names, watches state topic for gaps
    device_timeout_names: ["ur5e"]
    device_timeout_values: [100.0]   # ms

    # ── Logging configuration ─────────────────────────────────────────────────
    enable_logging: true
    enable_timing_log: true
    enable_device_log: true          # auto-creates per-device log files
    log_dir: ""
    max_log_sessions: 10

    # ── Joint names (channel count = array length) ──────────────────────────
    robot_joint_names:
      - "shoulder_pan_joint"
      - "shoulder_lift_joint"
      - "elbow_joint"
      - "wrist_1_joint"
      - "wrist_2_joint"
      - "wrist_3_joint"

    hand_joint_names:
      - "thumb_cmc_aa"
      - "thumb_cmc_fe"
      - "thumb_mcp_fe"
      - "index_mcp_aa"
      - "index_mcp_fe"
      - "index_dip_fe"
      - "middle_mcp_aa"
      - "middle_mcp_fe"
      - "middle_dip_fe"
      - "ring_mcp_fe"

    hand_sensor_names:
      - "thumb_baro"
      - "index_baro"
      - "middle_baro"
      - "ring_baro"

    # ── Joint limits ──────────────────────────────────────────────────────────
    joint_limits:
      max_velocity: 2.0              # rad/s
      max_acceleration: 5.0          # rad/s^2 (informational)
      position_limits:
        joint_0: [-6.28, 6.28]       # Base
        joint_1: [-6.28, 6.28]       # Shoulder
        joint_2: [-3.14, 3.14]       # Elbow
        joint_3: [-6.28, 6.28]       # Wrist 1
        joint_4: [-6.28, 6.28]       # Wrist 2
        joint_5: [-6.28, 6.28]       # Wrist 3

    # ── Status Monitor ────────────────────────────────────────────────────────
    enable_status_monitor: false
