# ur5e_robot.yaml — UR5e-specific configuration for RTC framework
# ROS2 Humble / Jazzy compatible flat parameter structure
/**:
  ros__parameters:
    # ── Control rate ──────────────────────────────────────────────────────────
    control_rate: 500.0 # Hz — timer period = 1e6/rate us

    # ── Initial controller ────────────────────────────────────────────────────
    initial_controller: "demo_joint_controller"

    # ── Initialization timeout ────────────────────────────────────────────────
    init_timeout_sec: 30.0 # E-STOP + shutdown if no robot/target data (sec)

    # ── Auto-hold position ────────────────────────────────────────────────────
    auto_hold_position: true # Auto-target current position when no external goal

    # ── E-STOP configuration ─────────────────────────────────────────────────
    enable_estop: true # E-STOP timeout monitoring
    # device_timeouts: matches topics group names, watches state topic for gaps
    device_timeout_names: ["ur5e", "hand"]
    device_timeout_values: [1000.0, 1000.0] # ms

    # ── Logging configuration ─────────────────────────────────────────────────
    enable_logging: true
    enable_timing_log: true
    enable_device_log: true # auto-creates per-device log files
    log_dir: ""
    max_log_sessions: 10

    # ── System URDF + model topology (shared by all controllers) ──────────
    urdf:
      package: "ur5e_description"
      path: "robots/ur5e/urdf/ur5e_with_hand.urdf.xacro"
      root_joint_type: "fixed"
      # ── Arm sub-model (6-DOF serial chain) ──────────────────────────────
      # Name matches device group "ur5e". Extracts base → tool0 chain.
      # All joints outside this chain (including hand passive_joints)
      # are locked at their reference configuration.
      sub_models:
        ur5e:
          root_link: "base"
          tip_link: "tool0"
      # ── Hand tree-model (10-DOF branching) ──────────────────────────────
      # Name matches device group "hand".
      tree_models:
        hand:
          root_link: "hand_base_link"
          tip_links: ["thumb_tip_link", "index_tip_link", "middle_tip_link", "ring_tip_link"]
      # ── Passive joints (locked in all sub/tree models) ──────────────────
      # Hand joints — locked when building the arm sub-model.
      # Required because the combined URDF has no <transmission> tags.
      # passive_joints:
      #   - "thumb_cmc_aa"
      #   - "thumb_cmc_fe"
      #   - "thumb_mcp_fe"
      #   - "index_mcp_aa"
      #   - "index_mcp_fe"
      #   - "index_dip_fe"
      #   - "middle_mcp_aa"
      #   - "middle_mcp_fe"
      #   - "middle_dip_fe"
      #   - "ring_mcp_fe"

    # ── Device configuration (keyed by controller topic group name) ─────────
    devices:
      ur5e:
        joint_state_names:
          - "shoulder_pan_joint"
          - "shoulder_lift_joint"
          - "elbow_joint"
          - "wrist_1_joint"
          - "wrist_2_joint"
          - "wrist_3_joint"
        # forward_position_controller receives Float64MultiArray.
        # Order matches joint_state_names; reorder map handles interface mapping.
        joint_command_names:
          - "shoulder_pan_joint"
          - "shoulder_lift_joint"
          - "elbow_joint"
          - "wrist_1_joint"
          - "wrist_2_joint"
          - "wrist_3_joint"
        joint_limits:
          max_velocity:     [2.0, 2.0, 3.0, 3.0, 3.0, 3.0]
          max_acceleration: [5.0, 5.0, 5.0, 5.0, 5.0, 5.0]
          max_torque:       [150.0, 150.0, 150.0, 28.0, 28.0, 28.0]
          position_lower:   [-6.28, -6.28, -3.14, -6.28, -6.28, -6.28]
          position_upper:   [6.28, 6.28, 3.14, 6.28, 6.28, 6.28]
      hand:
        joint_state_names:
          - "thumb_cmc_aa"
          - "thumb_cmc_fe"
          - "thumb_mcp_fe"
          - "index_mcp_aa"
          - "index_mcp_fe"
          - "index_dip_fe"
          - "middle_mcp_aa"
          - "middle_mcp_fe"
          - "middle_dip_fe"
          - "ring_mcp_fe"
        motor_state_names:
          - "motor_1"
          - "motor_2"
          - "motor_3"
          - "motor_4"
          - "motor_5"
          - "motor_6"
          - "motor_7"
          - "motor_8"
          - "motor_9"
          - "motor_10"
        sensor_names:
          - "thumb"
          - "index"
          - "middle"
          - "ring"
        joint_limits:
          max_velocity:   [6.28, 6.28, 6.28, 6.28, 6.28, 6.28, 6.28, 6.28, 6.28, 6.28]
          position_lower: [-3.14, -3.14, -1.57, -0.15, 0.0, 0.0, -0.15, 0.0, 0.0, 0.0]
          position_upper: [0.00, 0.00, 0.00, 0.15, 1.57, 1.57, 0.15, 1.57, 1.57, 1.57]
