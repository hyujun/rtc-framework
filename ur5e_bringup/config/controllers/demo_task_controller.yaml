demo_task_controller:
  # ── CLIK gains (robot arm task-space control) ──────────────────────────────
  kp_translation: [40.0, 40.0, 40.0]   # Translation proportional gain (x, y, z) [1/s]
  kp_rotation: [20.0, 20.0, 20.0]      # Rotation proportional gain (rx, ry, rz) [1/s]
  damping: 0.005                      # Damped pseudoinverse lambda (singularity stabilization)

  # ── Null-space configuration ────────────────────────────────────────────────
  enable_null_space: false            # Enable null-space joint centering
  null_kp: 0.5                       # Null-space proportional gain

  # ── 6-DOF mode ──────────────────────────────────────────────────────────────
  control_6dof: true                # false=3-DOF (position only), true=6-DOF (position+orientation)

  # ── Trajectory speed ───────────────────────────────────────────────────────
  # Desired speed for trajectory duration calculation.
  # Duration = max_dist / trajectory_speed.
  trajectory_speed: 0.01              # TCP max translational speed [m/s]
  trajectory_angular_speed: 0.08727   # TCP max rotational speed [rad/s] (6-DOF mode)
  hand_trajectory_speed: 3.14         # Hand motor trajectory speed [rad/s]

  # ── Trajectory velocity limits ──────────────────────────────────────────────
  # Max peak velocity during quintic trajectory.
  # Duration is extended so that peak velocity ≤ this limit.
  # (quintic rest-to-rest peak = 15/8 × Δ / T)
  max_traj_velocity: 0.1              # Max TCP translational velocity [m/s]
  max_traj_angular_velocity: 0.7854   # Max TCP angular velocity [rad/s] (6-DOF mode)
  hand_max_traj_velocity: 6.28       # Max hand motor velocity [rad/s]

  # ── Virtual TCP (fingertip-based control point) ─────────────────────────────
  # Mode: "disabled" (default), "centroid", "weighted", "constant"
  virtual_tcp_mode: "centroid"
  virtual_tcp_offset: [0.0, 0.0, 0.1]   # constant mode: [x, y, z] in TCP frame [m]
  virtual_tcp_orientation: [1.5708, 0.0, -1.5708]  # RPY [rad] orientation of vtcp in TCP frame

  # ── Grasp detection ─────────────────────────────────────────────────────────
  grasp_contact_threshold: 0.5   # Contact probability threshold (0.0~1.0)
  grasp_force_threshold: 1.0     # Force magnitude threshold [N]
  grasp_min_fingertips: 2        # Min fingertips for grasp detection

  # ── Grasp controller selection ─────────────────────────────────────────────
  # "contact_stop" (default): force 감지 시 hand position freeze
  # "force_pi": adaptive PI force controller with state machine
  grasp_controller_type: "contact_stop"

  # ── Force-PI grasp parameters (grasp_controller_type: "force_pi" 전용) ──
  force_pi_grasp:
    # PI gains
    Kp_base: 0.02               # [1/(N*s)] proportional gain base
    Ki_base: 0.002              # [1/(N*s^2)] integral gain base

    # Adaptive gain scheduling
    alpha_ema: 0.95             # stiffness EMA coefficient [0,1]
    beta: 0.3                   # adaptive gain sensitivity

    # Force thresholds
    f_contact_threshold: 0.2    # [N] contact detection threshold
    f_target: 2.0               # [N] target grip force
    f_ramp_rate: 1.0            # [N/s] force reference ramp rate

    # Rate & saturation limits
    ds_max: 0.05                # max ds/dt [1/s]
    delta_s_max: 0.15           # max deformation delta_s after contact
    integral_clamp: 0.1         # integrator saturation

    # State machine timing
    approach_speed: 0.2         # [1/s] approaching ds/dt
    release_speed: 0.3          # [1/s] releasing ds/dt
    settle_epsilon: 0.1         # [N] force convergence threshold
    settle_time: 0.3            # [s] convergence hold time
    contact_settle_time: 0.1    # [s] Contact phase dwell

    # Anomaly detection
    df_slip_threshold: 5.0      # [N/s] slip df/dt threshold
    grip_tightening_ratio: 0.15 # force increase ratio on slip
    f_max_multiplier: 2.0       # max force = f_target * multiplier

    # Force filter
    lpf_cutoff_hz: 25.0         # Bessel LPF cutoff [Hz]

    # Finger postures [rad] {MCP_AA, MCP_FE, DIP_FE}
    fingers:
      thumb:
        q_open:  [0.0, 0.0, 0.0]
        q_close: [0.524, 1.047, 0.785]
      index:
        q_open:  [0.0, 0.0, 0.0]
        q_close: [0.0, 1.047, 0.785]
      middle:
        q_open:  [0.0, 0.0, 0.0]
        q_close: [0.0, 1.047, 0.785]

  # ── Output type ─────────────────────────────────────────────────────────────
  command_type: "position"

  # ── Topic configuration ─────────────────────────────────────────────────────
  topics:
    ur5e:
      subscribe:
        - topic: "/ur5e/joint_goal"
          role: "target"
        - topic: "/joint_states"
          role: "state"
      publish:
        - topic: "/ur5e/joint_command"
          role: "joint_command"
        - topic: "/forward_position_controller/commands"
          role: "ros2_command"
          data_size: 6
        - topic: "/ur5e/gui_position"
          role: "gui_position"
        - topic: "/ur5e/state_log"
          role: "device_state_log"
    hand:
      subscribe:
        - topic: "/hand/joint_goal"
          role: "target"
        - topic: "/hand/joint_states"
          role: "state"
        - topic: "/hand/motor_states"
          role: "motor_state"
        - topic: "/hand/sensor_states"
          role: "sensor_state"
      publish:
        - topic: "/hand/joint_command"
          role: "joint_command"
        - topic: "/hand/gui_position"
          role: "gui_position"
        - topic: "/hand/state_log"
          role: "device_state_log"
        - topic: "/hand/sensor_log"
          role: "device_sensor_log"
        - topic: "/hand/grasp_state"
          role: "grasp_state"
        - topic: "/tof/snapshot"
          role: "tof_snapshot"
