demo_task_controller:
  # ── CLIK gains (robot arm task-space control) ──────────────────────────────
  kp_translation: [15.0, 15.0, 15.0]   # Translation proportional gain (x, y, z) [1/s]
  kp_rotation: [5.0, 5.0, 5.0]      # Rotation proportional gain (rx, ry, rz) [1/s]
  damping: 0.01                      # Damped pseudoinverse lambda (singularity stabilization)

  # ── Null-space configuration ────────────────────────────────────────────────
  enable_null_space: false            # Enable null-space joint centering
  null_kp: 0.5                       # Null-space proportional gain

  # ── 6-DOF mode ──────────────────────────────────────────────────────────────
  control_6dof: true                # false=3-DOF (position only), true=6-DOF (position+orientation)

  # ── Trajectory speed ───────────────────────────────────────────────────────
  # Desired speed for trajectory duration calculation.
  # Duration = max_dist / trajectory_speed.
  trajectory_speed: 0.1              # TCP max translational speed [m/s]
  trajectory_angular_speed: 0.5      # TCP max rotational speed [rad/s] (6-DOF mode)
  hand_trajectory_speed: 1.0         # Hand motor trajectory speed [rad/s]

  # ── Trajectory velocity limits ──────────────────────────────────────────────
  # Max peak velocity during quintic trajectory.
  # Duration is extended so that peak velocity ≤ this limit.
  # (quintic rest-to-rest peak = 15/8 × Δ / T)
  max_traj_velocity: 0.5             # Max TCP translational velocity [m/s]
  max_traj_angular_velocity: 1.0     # Max TCP angular velocity [rad/s] (6-DOF mode)
  hand_max_traj_velocity: 2.0        # Max hand motor velocity [rad/s]

  # ── Output type ─────────────────────────────────────────────────────────────
  command_type: "position"

  # ── Topic configuration ─────────────────────────────────────────────────────
  topics:
    ur5e:
      subscribe:
        - topic: "/ur5e/joint_goal"
          role: "target"
        - topic: "/joint_states"
          role: "state"
      publish:
        - topic: "/ur5e/joint_command"
          role: "joint_command"
        - topic: "/forward_position_controller/commands"
          role: "ros2_command"
          data_size: 6
        - topic: "/ur5e/gui_position"
          role: "gui_position"
        - topic: "/ur5e/state_log"
          role: "device_state_log"
    hand:
      subscribe:
        - topic: "/hand/joint_goal"
          role: "target"
        - topic: "/hand/joint_states"
          role: "state"
        - topic: "/hand/motor_states"
          role: "motor_state"
        - topic: "/hand/sensor_states"
          role: "sensor_state"
      publish:
        - topic: "/hand/joint_command"
          role: "joint_command"
        - topic: "/hand/gui_position"
          role: "gui_position"
        - topic: "/hand/state_log"
          role: "device_state_log"
        - topic: "/hand/sensor_log"
          role: "device_sensor_log"
