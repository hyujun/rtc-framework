# DemoWbcController — TSID QP → Position integration with FSM
# Whole-body controller for UR5e arm + 10-DoF hand.
# TSID produces optimal acceleration, integrated to position commands.
#
# Gains layout for ~/controller_gains (Phase 5):
#   [grasp_cmd(0/1/2), grasp_target_force,
#    arm_traj_speed, hand_traj_speed,
#    se3_weight, force_weight, posture_weight,
#    mpc_enable(0/1), riccati_gain_scale(0..1)] = 9 values
# Phase 4 compatibility: first 7 indices unchanged; the trailing 2 are
# optional — senders that still emit 7 values keep the Phase 4 behaviour.

demo_wbc_controller:
  command_type: "position"

  # ── Trajectory speeds (position mode phases) ──────────────────────────
  arm_trajectory_speed: 0.5       # rad/s, joint-space trajectory
  hand_trajectory_speed: 1.0      # rad/s
  arm_max_traj_velocity: 2.0      # rad/s, max velocity during trajectory
  hand_max_traj_velocity: 4.0     # rad/s

  # ── Topic routing ─────────────────────────────────────────────────────
  topics:
    ur5e:
      subscribe:
        - topic: "/ur5e/joint_goal"
          role: "target"
        - topic: "/joint_states"
          role: "state"
      publish:
        - topic: "/ur5e/joint_command"
          role: "joint_command"
        - topic: "/forward_position_controller/commands"
          role: "ros2_command"
          data_size: 6
        - topic: "/ur5e/gui_position"
          role: "gui_position"
        - topic: "/ur5e/state_log"
          role: "device_state_log"
    hand:
      subscribe:
        - topic: "/hand/joint_goal"
          role: "target"
        - topic: "/hand/joint_states"
          role: "state"
        - topic: "/hand/motor_states"
          role: "motor_state"
        - topic: "/hand/sensor_states"
          role: "sensor_state"
      publish:
        - topic: "/hand/joint_command"
          role: "joint_command"
        - topic: "/hand/gui_position"
          role: "gui_position"
        - topic: "/hand/state_log"
          role: "device_state_log"
        - topic: "/hand/sensor_log"
          role: "device_sensor_log"

  # ── TSID QP configuration ────────────────────────────────────────────
  tsid:
    formulation_type: "wqp"

    # ProxSuite dense QP solver (WQP). Read by rtc_tsid::WQPFormulation::init.
    # Note: only max_iter and eps_abs are currently read by rtc_tsid;
    # eps_rel / verbose are in QPSolverConfig but not wired through YAML yet
    # (upstream TODO). If formulation_type switches to "hqp", use
    # 'hqp.solver_per_level' and 'hqp.max_levels' instead.
    wqp:
      solver:
        max_iter: 20             # ProxSuite max iterations
        eps_abs: 1.0e-6          # absolute tolerance

    tasks:
      posture:
        type: "posture"
        weight: 1.0
        priority: 0
        kp: 10.0      # scalar → all joints
        kd: 6.0
      se3_tcp:
        type: "se3"
        frame: "tool0"
        mask: [1, 1, 1, 1, 1, 1]   # full 6-DoF
        kp: [100, 100, 100, 50, 50, 50]
        kd: [20, 20, 20, 10, 10, 10]
        weight: 100.0
        priority: 0
      # Contact force tracking (Phase 4B): active in closure/hold phases
      force:
        type: "force"
        weight: 10.0
        priority: 1

    constraints:
      eom:
        type: "eom"
      joint_limit:
        type: "joint_limit"
        dt: 0.002               # must match control_rate
        position_margin: 0.05   # rad
        velocity_margin: 0.1    # rad/s
      # Friction cone (Phase 4B): linearised n-face pyramid per contact
      friction_cone:
        type: "friction_cone"
        n_faces: 8

    contacts:
      - name: "thumb_tip"
        frame: "thumb_tip_link"
        type: "point"
        mu: 0.5
      - name: "index_tip"
        frame: "index_tip_link"
        type: "point"
        mu: 0.5
      - name: "middle_tip"
        frame: "middle_tip_link"
        type: "point"
        mu: 0.5

    phase_presets:
      pre_grasp:
        tasks:
          posture:   { active: true,  weight: 1.0,   priority: 0 } 
          se3_tcp:   { active: true,  weight: 200.0, priority: 0 }
        constraints:
          eom:           { active: true }
          joint_limit:   { active: true }

      closure:
        tasks:
          posture:   { active: true,  weight: 0.1,  priority: 0 }
          se3_tcp:   { active: true,  weight: 50.0, priority: 0 }
          force:     { active: true,  weight: 10.0, priority: 1 }
        constraints:
          eom:           { active: true }
          joint_limit:   { active: true }
          friction_cone: { active: true }

      hold:
        tasks:
          posture:   { active: true,  weight: 0.1,   priority: 0 }
          se3_tcp:   { active: true,  weight: 50.0,  priority: 0 }
          force:     { active: true,  weight: 20.0,  priority: 1 }
        constraints:
          eom:           { active: true }
          joint_limit:   { active: true }
          friction_cone: { active: true }

  # ── Integration safety ───────────────────────────────────────────────
  integration:
    position_margin: 0.02      # rad, from joint limits
    velocity_scale: 0.95       # fraction of max velocity
    force_rate_alpha: 0.1      # EMA alpha for df/dt smoothing at 500Hz
                               # (~20 Hz bandwidth). Range: [0, 1]

  # ── FSM thresholds ───────────────────────────────────────────────────
  fsm:
    epsilon_approach: 0.01       # m, approach → pre-grasp threshold
    epsilon_pregrasp: 0.005      # m, pre-grasp → closure threshold
    force_contact_threshold: 0.2 # N, per-fingertip contact detection
    force_hold_threshold: 1.0    # N, hold threshold
    min_contacts_for_hold: 2     # # of fingertips required for kClosure→kHold
    slip_rate_threshold: 5.0     # N/s, |df/dt| anomaly guard in kHold
    deformation_threshold: 0.015 # m, ||displacement|| anomaly guard in kHold
    max_qp_fail_before_fallback: 5
    approach_speed: 0.5          # rad/s (overrides arm_trajectory_speed)

  # ── E-STOP target (required) ────────────────────────────────────────
  estop:
    arm_safe_position:           # rad, 6 values = arm DoF (UR5e home pose)
      [0.0, -1.57, 1.57, -1.57, -1.57, 0.0]

  # ── MPC integration (Phase 5) ───────────────────────────────────────
  # When enabled, a soft-RT MPC thread (20 Hz, SCHED_FIFO 60 on 8+ core
  # systems — see rtc_base/threading/thread_config.hpp) publishes a
  # trajectory + Riccati gains into a lock-free triple buffer. On every
  # 500 Hz RT tick the controller consumes the latest solution, cubic-
  # Hermite interpolates it to the current time, and feeds (q_ref, v_ref,
  # a_ff + K·Δx) into the TSID posture/SE3 tasks.
  # Default enabled=false: disabled enablement preserves Phase 4 behaviour.
  mpc:
    enabled: false               # runtime-togglable via gains[7]
    engine: "mock"               # "mock" (Phase 5 default) | "handler" (Phase 7b)
    max_stale_solutions: 5       # ticks without a fresh solution before
                                 # falling back to Phase 4 reference

    # Phase 7b handler-mode inputs — ignored when engine == "mock".
    # Paths are resolved relative to the ur5e_bringup package share dir
    # (ament_index_cpp::get_package_share_directory).
    phase_config_path:  "config/controllers/phase_config.yaml"
    light_contact_path: "config/controllers/mpc_kinodynamics.yaml"
    contact_rich_path:  "config/controllers/mpc_fulldynamics.yaml"

    riccati:
      enabled: true              # include K·Δx in the reference accel
      gain_scale: 1.0            # runtime-tunable via gains[8] (0..1)
      accel_only: true           # write only the first nv entries of u_fb
      max_delta_x_norm: 100.0    # |Δx| cap (rad + rad/s)
