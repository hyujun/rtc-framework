demo_joint_controller:
  # ── Trajectory speed ───────────────────────────────────────────────────────
  # Desired joint speed for trajectory duration calculation [rad/s].
  # Duration = max_joint_dist / trajectory_speed.
  robot_trajectory_speed: 0.78
  hand_trajectory_speed: 3.14

  # ── Trajectory velocity limits ──────────────────────────────────────────────
  # Max peak joint velocity during quintic trajectory [rad/s].
  # Duration is extended so that peak velocity ≤ this limit.
  # (quintic rest-to-rest peak = 15/8 × Δq / T)
  robot_max_traj_velocity: 3.14
  hand_max_traj_velocity: 6.28

  # ── Shared parameters ───────────────────────────────────────────────────────
  # Virtual TCP, grasp detection, and force-PI grasp parameters are loaded from
  # config/controllers/demo_shared.yaml. To override any shared key locally,
  # add it under this section — per-controller values take precedence.

  # ── FSM tuning ──────────────────────────────────────────────────────────────
  # Required — LoadConfig throws if any key is missing or out of range.
  fsm:
    contact_stop_release_eps: 0.005 # rad, hand contact-stop release hysteresis

  # ── E-STOP ──────────────────────────────────────────────────────────────────
  # Joint position the E-STOP path drives the arm toward (rad, length = arm DoF).
  # Required — LoadConfig throws if missing or wrong length.
  estop:
    arm_safe_position:           # rad, 6 values = arm DoF (UR5e home pose)
      - 0.0
      - -1.57
      - 1.57
      - -1.57
      - -1.57
      - 0.0

  # ── Output type ─────────────────────────────────────────────────────────────
  command_type: "position"

  # ── Topic configuration ─────────────────────────────────────────────────────
  # ownership: "manager"   → CM owns the sub/pub (RT-adjacent, default)
  # ownership: "controller"→ per-controller LifecycleNode owns it; relative
  #                          paths resolve under namespace /<config_key>/
  topics:
    ur5e:
      subscribe:
        - topic: "ur5e/joint_goal"
          role: "target"
          ownership: "controller"
        - topic: "/joint_states"
          role: "state"
      publish:
        - topic: "/ur5e/joint_command"
          role: "joint_command"
        - topic: "/forward_position_controller/commands"
          role: "ros2_command"
          data_size: 6
        - topic: "ur5e/gui_position"
          role: "gui_position"
          ownership: "controller"
        - topic: "/ur5e/state_log"
          role: "device_state_log"
    hand:
      subscribe:
        - topic: "hand/joint_goal"
          role: "target"
          ownership: "controller"
        - topic: "/hand/joint_states"
          role: "state"
        - topic: "/hand/motor_states"
          role: "motor_state"
        - topic: "/hand/sensor_states"
          role: "sensor_state"
      publish:
        - topic: "/hand/joint_command"
          role: "joint_command"
        - topic: "hand/gui_position"
          role: "gui_position"
          ownership: "controller"
        - topic: "/hand/state_log"
          role: "device_state_log"
        - topic: "/hand/sensor_log"
          role: "device_sensor_log"
        - topic: "hand/grasp_state"
          role: "grasp_state"
          ownership: "controller"
        - topic: "tof/snapshot"
          role: "tof_snapshot"
          ownership: "controller"
