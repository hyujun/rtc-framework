demo_joint_controller:
  # ── UR5e robot arm P gains ([Base, Shoulder, Elbow, Wrist1, Wrist2, Wrist3]) ─
  # command = current_pos + kp * error * dt (incremental position step)
  robot_kp: [120.0, 120.0, 100.0, 80.0, 80.0, 80.0]

  # ── Hand motor P gains (10 motors) ──────────────────────────────────────────
  hand_kp: [50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0]

  # ── Output type ─────────────────────────────────────────────────────────────
  command_type: "position"

  # ── Topic configuration ─────────────────────────────────────────────────────
  topics:
    ur5e:
      subscribe:
        - topic: "/ur5e/joint_goal"
          role: "target"
        - topic: "/joint_states"
          role: "state"
      publish:
        - topic: "/ur5e/joint_command"
          role: "joint_command"
        - topic: "/forward_position_controller/commands"
          role: "ros2_command"
          data_size: 6
        - topic: "/ur5e/gui_position"
          role: "gui_position"
        - topic: "/ur5e/joint_state"
          role: "joint_state"
        - topic: "/ur5e/state_log"
          role: "device_state_log"
    hand:
      subscribe:
        - topic: "/hand/joint_goal"
          role: "target"
        - topic: "/hand/joint_states"
          role: "state"
        - topic: "/hand/sensor_states"
          role: "sensor_state"
      publish:
        - topic: "/hand/joint_command"
          role: "joint_command"
        - topic: "/hand/joint_state"
          role: "joint_state"
        - topic: "/hand/state_log"
          role: "device_state_log"
        - topic: "/hand/sensor_log"
          role: "device_sensor_log"
