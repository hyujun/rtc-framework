demo_joint_controller:
  # ── UR5e 로봇 암 P 게인 ([Base, Shoulder, Elbow, Wrist1, Wrist2, Wrist3]) ─
  # command = current_pos + kp * error * dt (증분 위치 스텝)
  robot_kp: [120.0, 120.0, 100.0, 80.0, 80.0, 80.0]

  # ── 핸드 모터 P 게인 (10개 모터) ──────────────────────────────────────────
  hand_kp: [50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0]

  # ── 출력 타입 ─────────────────────────────────────────────────────────────
  command_type: "position"

  # ── 디바이스 활성화 ────────────────────────────────────────────────────────
  enable_ur5e: true
  enable_hand: true              # 이 컨트롤러만 핸드 활성화

  # ── 토픽 설정 ─────────────────────────────────────────────────────────────
  topics:
    ur5e:
      subscribe:
        # 카테고리 1: Goal State (궤적 최종 목표)
        - topic: "/ur5e/target_joint_positions"
          role: "goal"
        # 카테고리 2: Current State (센서 피드백)
        - topic: "/joint_states"
          role: "joint_state"
      publish:
        # 카테고리 3: Control Command (액추에이터 출력)
        - topic: "/forward_position_controller/commands"
          role: "position_command"
          data_size: 6
        # 카테고리 4: Logging/Monitoring (진단 발행)
        - topic: "/ur5e/current_task_position"
          role: "task_position"
          data_size: 6
        - topic: "/ur5e/trajectory_state"
          role: "trajectory_state"
          data_size: 18
        - topic: "/ur5e/controller_state"
          role: "controller_state"
          data_size: 18
    hand:
      subscribe:
        # 카테고리 1: Hand Goal State (핸드 모터 목표 위치)
        - topic: "/hand/target_joint_positions"
          role: "goal"
        # 카테고리 2: Hand Current State (센서 피드백)
        - topic: "/hand/joint_states"
          role: "hand_state"
      publish:
        - topic: "/hand/command"
          role: "hand_command"
          data_size: 10
