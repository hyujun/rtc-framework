# ur5e_sim.yaml — UR5e simulation configuration for RTC framework
# Used by sim.launch.py (MuJoCo simulation mode)
# For real robot, use ur5e_robot.yaml instead
/**:
  ros__parameters:
    # ── Control rate ──────────────────────────────────────────────────────────
    control_rate: 500.0              # Hz — timer period = 1e6/rate us

    # ── Initial controller ────────────────────────────────────────────────────
    initial_controller: "demo_joint_controller"

    # ── Initialization timeout ────────────────────────────────────────────────
    init_timeout_sec: 0.0            # Disabled for simulation (no real hardware init)

    # ── Auto-hold position ────────────────────────────────────────────────────
    auto_hold_position: true         # Auto-target current position when no external goal

    # ── E-STOP configuration (relaxed for simulation) ────────────────────────
    enable_estop: false              # Disabled for simulation
    device_timeout_names: ["ur5e", "hand"]
    device_timeout_values: [10000.0, 10000.0]  # Relaxed for sim startup

    # ── Logging configuration ─────────────────────────────────────────────────
    enable_logging: true
    enable_timing_log: true
    enable_robot_log: true
    enable_hand_log: true
    log_dir: ""
    max_log_sessions: 10

    # ── Joint names (UR5e URDF active joints) ─────────────────────────────────
    robot_joint_names:
      - "shoulder_pan_joint"
      - "shoulder_lift_joint"
      - "elbow_joint"
      - "wrist_1_joint"
      - "wrist_2_joint"
      - "wrist_3_joint"

    # ── Joint limits ──────────────────────────────────────────────────────────
    joint_limits:
      max_velocity: 2.0              # rad/s
      max_acceleration: 5.0          # rad/s^2 (informational)
      position_limits:
        joint_0: [-6.28, 6.28]       # Base
        joint_1: [-6.28, 6.28]       # Shoulder
        joint_2: [-3.14, 3.14]       # Elbow
        joint_3: [-6.28, 6.28]       # Wrist 1
        joint_4: [-6.28, 6.28]       # Wrist 2
        joint_5: [-6.28, 6.28]       # Wrist 3

