# ur5e_sim.yaml — UR5e simulation configuration for RTC framework
# Used by sim.launch.py (MuJoCo simulation mode)
# For real robot, use ur5e_robot.yaml instead
/**:
  ros__parameters:
    # ── Control rate ──────────────────────────────────────────────────────────
    control_rate: 500.0 # Hz — timer period = 1e6/rate us

    # ── Initial controller ────────────────────────────────────────────────────
    initial_controller: "demo_joint_controller"

    # ── Initialization timeout ────────────────────────────────────────────────
    init_timeout_sec: 0.0 # Disabled for simulation (no real hardware init)

    # ── Auto-hold position ────────────────────────────────────────────────────
    auto_hold_position: true # Auto-target current position when no external goal

    # ── Simulation sync ──────────────────────────────────────────────────────
    use_sim_time_sync: true       # CV-based wakeup (sim), false = clock_nanosleep (real)
    sim_sync_timeout_sec: 5.0     # Shutdown if no state received within timeout

    # ── E-STOP configuration (relaxed for simulation) ────────────────────────
    enable_estop: false # Disabled for simulation
    device_timeout_names: ["ur5e", "hand"]
    device_timeout_values: [10000.0, 10000.0] # Relaxed for sim startup

    # ── Logging configuration ─────────────────────────────────────────────────
    enable_logging: true
    enable_timing_log: true
    enable_device_log: true # auto-creates per-device log files
    log_dir: ""
    max_log_sessions: 10

    # ── System URDF + model topology (shared by all controllers) ──────────
    urdf:
      package: "ur5e_description"
      path: "robots/ur5e_hand_tmp/urdf/ur5e_with_hand.urdf.xacro"
      root_joint_type: "fixed"
      sub_models:
        ur5e:
          root_link: "base"
          tip_link: "tool0"
      tree_models:
        hand:
          root_link: "hand_base_link"
          tip_links: ["thumb_tip_link", "index_tip_link", "middle_tip_link", "ring_tip_link"]
        # MPC-dedicated arm+hand tree. Mimic joints are auto-classified as
        # passive/kMimic by UrdfAnalyzer and locked during buildReducedModel,
        # yielding a clean nq == nv == 16 model (6 arm + 10 actuated hand
        # DoFs). MPC prediction uses this reduced space; TSID/WBC still use
        # the full model (nq=26, nv=21) so mimic kinematics remain correct
        # downstream.
        mpc:
          root_link: "base"
          tip_links: ["thumb_tip_link", "index_tip_link", "middle_tip_link", "ring_tip_link"]
      # passive_joints:
      #   - "thumb_cmc_aa"
      #   - "thumb_cmc_fe"
      #   - "thumb_mcp_fe"
      #   - "index_mcp_aa"
      #   - "index_mcp_fe"
      #   - "index_dip_fe"
      #   - "middle_mcp_aa"
      #   - "middle_mcp_fe"
      #   - "middle_dip_fe"
      #   - "ring_mcp_fe"

    # ── Device configuration (keyed by controller topic group name) ─────────
    devices:
      ur5e:
        joint_state_names:
          - "shoulder_pan_joint"
          - "shoulder_lift_joint"
          - "elbow_joint"
          - "wrist_1_joint"
          - "wrist_2_joint"
          - "wrist_3_joint"
        joint_limits:
          max_velocity:     [2.0, 2.0, 3.0, 3.0, 3.0, 3.0]
          max_acceleration: [5.0, 5.0, 5.0, 5.0, 5.0, 5.0]
          max_torque:       [150.0, 150.0, 150.0, 28.0, 28.0, 28.0]
          position_lower:   [-6.28, -6.28, -3.14, -6.28, -6.28, -6.28]
          position_upper:   [6.28, 6.28, 3.14, 6.28, 6.28, 6.28]
      hand:
        joint_state_names:
          - "thumb_cmc_aa"
          - "thumb_cmc_fe"
          - "thumb_mcp_fe"
          - "index_mcp_aa"
          - "index_mcp_fe"
          - "index_dip_fe"
          - "middle_mcp_aa"
          - "middle_mcp_fe"
          - "middle_dip_fe"
          - "ring_mcp_fe"
        sensor_names:
          - "thumb"
          - "index"
          - "middle"
          - "ring"
        joint_limits:
          max_velocity:   [6.28, 6.28, 6.28, 6.28, 6.28, 6.28, 6.28, 6.28, 6.28, 6.28]
          position_lower: [-1.57, -1.57, -1.57, -0.15, 0.0, 0.0, -0.15, 0.0, 0.0, 0.0]
          position_upper: [1.57, 1.57, 0.00, 0.15, 1.57, 1.57, 0.15, 1.57, 1.57, 1.57]
