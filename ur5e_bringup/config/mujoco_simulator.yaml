# MuJoCo Simulator — UR5e + 10-DOF hand configuration
# ─────────────────────────────────────────────────────
# Robot-specific overrides for the agnostic mujoco_simulator_node.
# Loaded by ur5e_bringup/launch/sim.launch.py.
#
# Generic defaults live in rtc_mujoco_sim/config/mujoco_default.yaml.
# RTC controller param overrides live in ur5e_bringup/config/ur5e_sim.yaml.

mujoco_simulator:
  ros__parameters:
    # ── Model ────────────────────────────────────────────────────────────────
    model_path: "robots/ur5e_hand_tmp/mjcf/scene_with_hand.xml"

    # ── Sync timeout ─────────────────────────────────────────────────────────
    # Max time to wait for a controller command per step (ms).
    sync_timeout_ms: 50.0

    # ── Max Real-Time Factor ──────────────────────────────────────────────────
    max_rtf: 1.0

    # ── Viewer ───────────────────────────────────────────────────────────────
    enable_viewer: true
    viewer_refresh_rate: 60.0  # Hz — viewer target refresh rate (affects both viz buffer and render loop)

    # ── Physics Timestep ──────────────────────────────────────────────────────
    physics_timestep: 0.002 # seconds — control period (constant)
    n_substeps: 3           # physics substeps per control cycle (substep_dt = physics_timestep / n_substeps)

    # ── Position Servo Gains (글로벌 기본값) ──────────────────────────────────
    use_yaml_servo_gains: false
    servo_kp: [500.0, 500.0, 500.0, 150.0, 150.0, 150.0]
    servo_kd: [400.0, 400.0, 400.0, 100.0, 100.0, 100.0]

    # ── Robot Response (MuJoCo 물리 시뮬레이션) ──────────────────────────────
    # command_joint_names: actuator 매칭용 (XML joint name). 합집합 == XML 전체 joints 필수.
    # state_joint_names:   state publish용 (XML joint name). 비우면 XML 전체 사용.
    # joint_names:         하위호환 — command_joint_names 미지정 시 대체 사용.
    # 하나라도 다르면 Initialize() FAIL.
    robot_response:
      groups: ["ur5e", "hand"]
      ur5e:
        command_joint_names:
          - shoulder_pan_joint
          - shoulder_lift_joint
          - elbow_joint
          - wrist_1_joint
          - wrist_2_joint
          - wrist_3_joint
        state_joint_names:
          - shoulder_pan_joint
          - shoulder_lift_joint
          - elbow_joint
          - wrist_1_joint
          - wrist_2_joint
          - wrist_3_joint
        command_topic: "/ur5e/joint_command"
        state_topic: "/joint_states"
        # sensor_topic: "/ur5e/sim_sensors"   # uncomment + add sensor_names to enable
        # sensor_names: ["auto"]               # "auto" = all XML sensors, or list specific names
        # sensor_names: ["ft_sensor"]          # example: explicit sensor names
      hand:
        command_joint_names:
          - thumb_cmc_aa
          - thumb_cmc_fe
          - thumb_mcp_fe
          - index_mcp_aa
          - index_mcp_fe
          - index_dip_fe
          - middle_mcp_aa
          - middle_mcp_fe
          - middle_dip_fe
          - ring_mcp_fe
        command_topic: "/hand/joint_command"
        state_topic: "/hand/joint_states"
        # sensor_topic: "/hand/sim_sensors"   # uncomment + add sensor_names to enable
        # sensor_names: ["auto"]               # "auto" = all XML sensors, or list specific names

    # ── Fake Response (LPF 에코백, MuJoCo 물리 아님) ─────────────────────────
    # robot_response와 같은 그룹 이름 중복 불가.
    # 토픽 이름이 비어있으면 에러.
    # XML에 hand가 없는 모델 사용 시 hand를 fake_response로 이동.
    # fake_response:
    #   groups: ["hand"]
    #   hand:
    #     command_joint_names:
    #       - thumb_cmc_aa
    #       - thumb_cmc_fe
    #       - thumb_mcp_fe
    #       - index_mcp_aa
    #       - index_mcp_fe
    #       - index_dip_fe
    #       - middle_mcp_aa
    #       - middle_mcp_fe
    #       - middle_dip_fe
    #       - ring_mcp_fe
    #     # state_joint_names: 비우면 command_joint_names와 동일
    #     command_topic: "/hand/joint_command"
    #     state_topic: "/hand/joint_states"
    #     filter_alpha: 0.1

