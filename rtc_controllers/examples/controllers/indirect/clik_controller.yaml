# ── EXAMPLE — reference config for ClikController ─────────────────────────────
# Location: rtc_controllers/examples/controllers/indirect/ (installed under
#           share/rtc_controllers/examples/). NOT a production YAML.
#
# rtc_controllers ships this as a *reference example* only. The class is not
# auto-registered; downstream <robot>_bringup packages opt in by:
#   1) adding a `RTC_REGISTER_CONTROLLER(clik_controller, "indirect",
#      "<robot>_bringup", std::make_unique<rtc::ClikController>(...))`
#      registration in their controller_registration.cpp, and
#   2) copying this YAML to `<robot>_bringup/config/controllers/indirect/` and
#      replacing the placeholder topic group ("<robot>" below) with their own
#      robot identity (matches their CM `devices.<group>` key).
# Keeping ARCH-1 invariant: rtc_* may not host robot-specific production YAML.
# ──────────────────────────────────────────────────────────────────────────────
clik_controller:
  # ── CLIK 게인 ─────────────────────────────────────────────────────────────
  kp_translation: [1.0, 1.0, 1.0]   # 병진 비례 게인 (x, y, z) [1/s]
  kp_rotation: [1.0, 1.0, 1.0]      # 회전 비례 게인 (rx, ry, rz) [1/s]
  damping: 0.01                           # 감쇠 유사역행렬 λ (특이점 근처 안정화)

  # ── 영공간 (null-space) 설정 ──────────────────────────────────────────────
  enable_null_space: true                 # 영공간 관절 센터링 활성화
  null_kp: 0.5                            # 영공간 비례 게인

  # ── 6-DOF 모드 ────────────────────────────────────────────────────────────
  control_6dof: false                     # false=3-DOF(위치만), true=6-DOF(위치+방향)

  # ── 궤적 속도 ────────────────────────────────────────────────────────────
  trajectory_speed: 0.1                   # TCP 최대 병진 속도 (m/s)
  trajectory_angular_speed: 0.5           # TCP 최대 회전 속도 (rad/s, 6-DOF 모드)

  # ── 궤적 속도 제한 ────────────────────────────────────────────────────────
  # quintic rest-to-rest 최대 속도 = 15/8 × Δ / T
  max_traj_velocity: 0.5                  # 최대 TCP 병진 속도 [m/s]
  max_traj_angular_velocity: 1.0          # 최대 TCP 회전 속도 [rad/s]

  # ── 출력 타입 ─────────────────────────────────────────────────────────────
  command_type: "position"

  # ── 토픽 설정 ─────────────────────────────────────────────────────────────
  # `<robot>` 는 device-group 키 placeholder — <robot>_bringup 에서 자신의 CM
  # `devices.<group>` 키 (e.g. "ur5e", "iiwa7") 로 교체. 토픽 경로의 `<robot>` 도
  # 동일한 그룹 이름으로 치환.
  topics:
    <robot>:
      subscribe:
        - topic: "/<robot>/joint_goal"
          role: "target"
        - topic: "/joint_states"
          role: "state"
      publish:
        - topic: "/<robot>/joint_command"
          role: "joint_command"
        - topic: "/forward_position_controller/commands"
          role: "ros2_command"
