# ── EXAMPLE — reference config for JointPDController ──────────────────────────
# Location: rtc_controllers/examples/controllers/direct/ (installed under
#           share/rtc_controllers/examples/). NOT a production YAML.
#
# rtc_controllers ships this as a *reference example* only. The class is not
# auto-registered; downstream <robot>_bringup packages opt in by:
#   1) adding a `RTC_REGISTER_CONTROLLER(joint_pd_controller, "direct",
#      "<robot>_bringup", std::make_unique<rtc::JointPDController>(...))`
#      registration in their controller_registration.cpp, and
#   2) copying this YAML to `<robot>_bringup/config/controllers/direct/` and
#      replacing the placeholder gains/joint count and topic group name
#      ("<robot>" below) with their own robot identity.
# Keeping ARCH-1 invariant: rtc_* may not host robot-specific production YAML.
# ──────────────────────────────────────────────────────────────────────────────
joint_pd_controller:
  # ── PD 게인 (관절 수·값은 <robot>_bringup 에서 robot DoF 에 맞춰 교체) ────
  kp: [200.0, 200.0, 150.0, 120.0, 120.0, 120.0]
  kd: [30.0, 30.0, 25.0, 20.0, 20.0, 20.0]

  # ── 동역학 보상 ───────────────────────────────────────────────────────────
  enable_gravity_compensation: false     # 중력 보상 (true = PD + g(q))
  enable_coriolis_compensation: false    # 코리올리/원심력 보상 (true = + C(q,v)·v)

  # ── 궤적 속도 제한 ────────────────────────────────────────────────────────
  # 5차 다항식 궤적 소요시간 = max(0.01, max_joint_dist / trajectory_speed)
  trajectory_speed: 1.0                  # 최대 관절 이동 속도 (rad/s)

  # ── 출력 타입 ─────────────────────────────────────────────────────────────
  command_type: "torque"

  # ── 토픽 설정 ─────────────────────────────────────────────────────────────
  # Phase 4: device-wire lanes (state / joint_command / ros2_command /
  # motor_state / sensor_state) are owned by DeviceBackend impls — declare
  # them in `<robot>_bringup` sim.yaml/robot.yaml under
  # `devices.<robot>.backend: {type, state_topic, command_topic, ...}`.
  # Controller YAML keeps only target / robot_target / robot_transforms.
  # `<robot>` is a device-group placeholder; replace with your CM group key.
  topics:
    <robot>:
      subscribe:
        - topic: "/<robot>/joint_goal"
          role: "target"
