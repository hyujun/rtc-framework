# ── EXAMPLE — reference config for OperationalSpaceController ─────────────────
# Location: rtc_controllers/examples/controllers/direct/ (installed under
#           share/rtc_controllers/examples/). NOT a production YAML.
#
# rtc_controllers ships this as a *reference example* only. The class is not
# auto-registered; downstream <robot>_bringup packages opt in by:
#   1) adding a `RTC_REGISTER_CONTROLLER(operational_space_controller, "direct",
#      "<robot>_bringup", std::make_unique<rtc::OperationalSpaceController>(...))`
#      registration in their controller_registration.cpp, and
#   2) copying this YAML to `<robot>_bringup/config/controllers/direct/` and
#      replacing the placeholder topic group ("<robot>" below) with their own
#      robot identity (matches their CM `devices.<group>` key).
# Keeping ARCH-1 invariant: rtc_* may not host robot-specific production YAML.
# ──────────────────────────────────────────────────────────────────────────────
operational_space_controller:
  # ── 데카르트 PD 게인 ──────────────────────────────────────────────────────
  kp_pos: [1.0, 1.0, 1.0]               # 위치 비례 게인 (x, y, z)
  kd_pos: [0.1, 0.1, 0.1]               # 위치 미분 게인 (x, y, z)
  kp_rot: [0.5, 0.5, 0.5]               # 회전 비례 게인 (rx, ry, rz)
  kd_rot: [0.05, 0.05, 0.05]            # 회전 미분 게인 (rx, ry, rz)

  # ── 특이점 감쇠 ───────────────────────────────────────────────────────────
  damping: 0.01                           # 야코비안 감쇠 유사역행렬 λ

  # ── 동역학 보상 ───────────────────────────────────────────────────────────
  enable_gravity_compensation: false      # 중력 보상 활성화 (true = + g(q))

  # ── 궤적 속도 ────────────────────────────────────────────────────────────
  trajectory_speed: 0.1                   # TCP 최대 병진 속도 (m/s)
  trajectory_angular_speed: 0.5           # TCP 최대 회전 속도 (rad/s)

  # ── 궤적 속도 제한 ────────────────────────────────────────────────────────
  # quintic rest-to-rest 최대 속도 = 15/8 × Δ / T
  max_traj_velocity: 0.5                  # 최대 TCP 병진 속도 [m/s]
  max_traj_angular_velocity: 1.0          # 최대 TCP 회전 속도 [rad/s]

  # ── 출력 타입 ─────────────────────────────────────────────────────────────
  command_type: "torque"

  # ── 토픽 설정 ─────────────────────────────────────────────────────────────
  # `<robot>` 는 device-group 키 placeholder — <robot>_bringup 에서 자신의 CM
  # `devices.<group>` 키 (e.g. "ur5e", "iiwa7") 로 교체. 토픽 경로의 `<robot>` 도
  # 동일한 그룹 이름으로 치환.
  topics:
    <robot>:
      subscribe:
        - topic: "/<robot>/joint_goal"
          role: "target"
        - topic: "/joint_states"
          role: "state"
      publish:
        - topic: "/<robot>/joint_command"
          role: "joint_command"
        - topic: "/forward_torque_controller/commands"
          role: "ros2_command"
