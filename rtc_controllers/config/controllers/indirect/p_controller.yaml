p_controller:
  # ── P 게인 (각 관절: [Base, Shoulder, Elbow, Wrist1, Wrist2, Wrist3]) ─────
  # command = current_pos + kp * error * dt (증분 위치 스텝)
  kp: [120.0, 120.0, 100.0, 80.0, 80.0, 80.0]

  # ── 출력 타입 ─────────────────────────────────────────────────────────────
  command_type: "position"

  # ── 토픽 설정 ─────────────────────────────────────────────────────────────
  topics:
    ur5e:
      subscribe:
        - topic: "/ur5e/joint_goal"
          role: "target"
        - topic: "/joint_states"
          role: "state"
      publish:
        - topic: "/ur5e/joint_command"
          role: "joint_command"
        - topic: "/forward_position_controller/commands"
          role: "ros2_command"
        - topic: "/ur5e/gui_position"
          role: "gui_position"
        - topic: "/ur5e/robot_target"
          role: "robot_target"
        - topic: "/ur5e/state_log"
          role: "device_state_log"
