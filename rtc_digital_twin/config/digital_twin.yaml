# digital_twin.yaml — Generalized Digital Twin configuration
#
# Subscribes to one or more JointState topics (RELIABLE, depth 10),
# merges them, and publishes a combined JointState for robot_state_publisher.
# Validates received joints against URDF (excluding fixed/mimic joints).

/**:
  ros__parameters:
    # ── Robot description ──────────────────────────────────────────────
    # Option 1: Package-based path (package name + relative path)
    robot_description_package: "ur5e_description"               # e.g. "ur5e_description"
    robot_description_path: "robots/ur5e/urdf/ur5e_with_hand.urdf.xacro"                  # e.g. "robots/ur5e/urdf/ur5e_with_hand.urdf.xacro"
    # Option 2: Absolute file path
    robot_description_file: ""                  # e.g. "/path/to/robot.urdf"

    display_rate: 60.0                          # Hz — combined JointState publish rate
    output_topic: "/digital_twin/joint_states"  # Combined output for robot_state_publisher
    auto_compute_mimic: true                    # Auto-compute mimic joint positions from URDF

    # ── Joint state sources ──────────────────────────────────────────────
    num_sources: 2

    source_0.topic: "/ur5e/digital_twin/joint_states"
    source_0.joint_names: [""]        # empty/"" = accept all joints from topic

    source_1.topic: "/hand/digital_twin/joint_states"
    source_1.joint_names: [""]       # empty/"" = accept all joints from topic

    # Example: multi-source (uncomment for UR5e + hand)
    # num_sources: 2
    # source_0.topic: "/ur5e/digital_twin/joint_states"
    # source_0.joint_names:
    #   - "shoulder_pan_joint"
    #   - "shoulder_lift_joint"
    #   - "elbow_joint"
    #   - "wrist_1_joint"
    #   - "wrist_2_joint"
    #   - "wrist_3_joint"
    # source_1.topic: "/hand/digital_twin/joint_states"
    # source_1.joint_names:
    #   - "thumb_cmc_aa"
    #   - "thumb_cmc_fe"
    #   - "thumb_mcp_fe"
    #   - "index_mcp_aa"
    #   - "index_mcp_fe"
    #   - "index_dip_fe"
    #   - "middle_mcp_aa"
    #   - "middle_mcp_fe"
    #   - "middle_dip_fe"
    #   - "ring_mcp_fe"

    # ── Joint State Publisher GUI (optional) ────────────────────────────
    joint_gui.enabled: false                    # true = launch GUI node
    joint_gui.output_topic: "/joint_gui/joint_states"   # JointState output topic
    joint_gui.publish_rate: 10.0                # Hz — GUI publish rate

    # ── Sensor visualization ────────────────────────────────────────────
    sensor_viz.sensor_topic: "/hand/sensor_states/monitor"
    sensor_viz.marker_topic: "/digital_twin/fingertip_markers"
    sensor_viz.fingertip_names: ["thumb", "index", "middle", "ring"]

    # Barometer: +Z Arrow markers (2×4 grid, 1mm spacing)
    sensor_viz.barometer_min: 0.0
    sensor_viz.barometer_max: 1000.0
    sensor_viz.barometer_arrow_max_length: 0.015    # max arrow length (m)
    sensor_viz.barometer_arrow_scale: 0.0008        # arrow shaft diameter (m)

    # ToF: +Z Arrow markers (disabled by default)
    sensor_viz.tof_enabled: false
    sensor_viz.tof_max_distance: 0.2
    sensor_viz.tof_arrow_scale: 0.003

    # Force (F): 3D Arrow marker
    sensor_viz.force_arrow_scale: 0.01              # length per Newton (m/N)
    sensor_viz.force_arrow_shaft: 0.003             # shaft diameter (m)

    # Displacement (u): 3D Arrow marker
    sensor_viz.displacement_arrow_scale: 0.05       # length per unit (m)
    sensor_viz.displacement_arrow_shaft: 0.002      # shaft diameter (m)

    # Contact: Sphere overlay at fingertip origin
    sensor_viz.contact_sphere_radius: 0.005         # sphere radius (m)

    # ── TCP visualization ───────────────────────────────────────────────
    # Subscribes to GuiPosition for task-space TCP data (actual + goal).
    # Publishes MarkerArray (sphere + axes) and optionally broadcasts TF.
    tcp_viz.source_topic: "/ur5e/gui_position"      # GuiPosition topic
    tcp_viz.marker_topic: "/digital_twin/tcp_markers"
    tcp_viz.frame_id: "base"                        # parent TF frame
    tcp_viz.broadcast_tf: true                      # broadcast virtual_tcp TF
    tcp_viz.tf_child_frame: "virtual_tcp"           # TF child frame name

    # TCP sphere (current position)
    tcp_viz.sphere_radius: 0.012                    # sphere radius (m)

    # TCP axes (orientation arrows)
    tcp_viz.axes_length: 0.05                       # axis arrow length (m)
    tcp_viz.axes_shaft: 0.004                       # axis arrow shaft diameter (m)

    # Goal sphere (target position, semi-transparent)
    tcp_viz.show_goal: true
    tcp_viz.goal_sphere_radius: 0.010               # goal sphere radius (m)
