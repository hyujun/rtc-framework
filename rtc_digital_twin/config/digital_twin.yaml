# digital_twin.yaml — Digital Twin RViz2 visualization parameters

/**:
  ros__parameters:
    display_rate: 60.0          # Hz — RViz refresh rate
    enable_hand: true           # Enable hand visualization

    # Subscribe topics
    robot_joint_states_topic: "/joint_states"
    hand_joint_states_topic: "/hand/joint_states"

    # Robot joint names (URDF joint order)
    robot_joint_names:
      - "shoulder_pan_joint"
      - "shoulder_lift_joint"
      - "elbow_joint"
      - "wrist_1_joint"
      - "wrist_2_joint"
      - "wrist_3_joint"

    # Hand motor names (URDF joint order, 1:1 with Float64MultiArray index)
    hand_motor_names:
      - "thumb_cmc_aa"
      - "thumb_cmc_fe"
      - "thumb_mcp_fe"
      - "index_mcp_aa"
      - "index_mcp_fe"
      - "index_dip_fe"
      - "middle_mcp_aa"
      - "middle_mcp_fe"
      - "middle_dip_fe"
      - "ring_mcp_fe"

    # Fingertip names for sensor visualization
    fingertip_names:
      - "thumb"
      - "index"
      - "middle"
      - "ring"

    # Sensor visualization settings
    sensor_viz:
      barometer_min: 0.0          # Min pressure (normalization lower bound)
      barometer_max: 1000.0       # Max pressure (normalization upper bound)
      barometer_sphere_min: 0.002 # Min sphere radius (m)
      barometer_sphere_max: 0.008 # Max sphere radius (m)
      tof_max_distance: 0.2       # ToF max display distance (m)
      tof_arrow_scale: 0.003      # Arrow shaft width (m)
