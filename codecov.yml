# Codecov 설정 — rtc-framework
# https://docs.codecov.io/docs/codecov-yaml
#
# Single source of truth for coverage targets:
#   - 빌드/테스트 패키지 목록: .github/ci-packages.yml
#   - lcov 추출 경로: ci-packages.yml 의 coverage_paths field
#
# ⚠ 2026-04-28 상태: ros2-advanced-ci.yml 에서 C++ coverage upload 일시 중단됨
#   (ament_cmake_test 가 ctest child 환경에서 ModuleNotFoundError —
#   agent_docs/ci-rewrite-plan.md §8 참조). Build (C++) 는 성공하지만
#   colcon test / lcov / Codecov upload step 모두 제거된 상태.
#
#   현 시점 활성 업로드: python flag (rtc_tools, rtc_digital_twin) 만.
#
#   C++ upload 복원 시 추가/복원할 항목 (git history 에서 부활 가능):
#     - flags.cpp (paths + carryforward)
#     - coverage.status.project.rt_core (RT-critical 패키지 회귀 감시)
#     - component_management (12 components — base, communication, controllers,
#       controller_manager, inference, tsid, urdf_bridge, shape_estimation,
#       hand_driver, bt_coordinator, bringup, controller_interface)
#   참조 commit: 158b490 이전 codecov.yml

codecov:
  require_ci_to_pass: false   # coverage 업로드는 CI 실패와 독립적으로 처리
  notify:
    wait_for_ci: true

github_checks:
  annotations: true           # PR diff 라인에 인라인 coverage annotation

coverage:
  precision: 2
  round: down
  range: "0...100"

  status:
    project:
      default:
        target: auto
        threshold: 0.5%
        if_ci_failed: success
        informational: false
    patch:
      default:
        target: 60%
        threshold: 5%
        if_ci_failed: success

# 활성 flag 만 유지 (cpp flag 는 CI 복원 시 git 에서 부활).
flags:
  python:
    paths:
      - rtc_tools/
      - rtc_digital_twin/
    carryforward: true
    carryforward_mode: "labels"

# 커버리지에서 제외할 경로
ignore:
  - "robot_descriptions/**"          # 데이터/설정 전용
  - "rtc_mujoco_sim/**"              # MuJoCo (옵셔널)
  - "rtc_msgs/**"                    # rosidl 자동 생성
  - "shape_estimation_msgs/**"       # rosidl 자동 생성
  - "repo_scripts/**"                 # 셸 스크립트
  - "**/test/**"
  - "**/tests/**"
  - "**/launch/**"
  - "**/config/**"
  - "**/examples/**"
  - "**/build/**"
  - "**/install/**"
  - "**/log/**"

comment:
  layout: "header, diff, flags, components, files, footer"
  behavior: default
  require_changes: false
  show_carryforward_flags: true
