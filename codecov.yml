# Codecov 설정 — rtc-framework
# https://docs.codecov.io/docs/codecov-yaml
#
# Single source of truth for coverage targets:
#   - 빌드/테스트 패키지 목록: .github/ci-packages.yml (build, test_cpp,
#     test_python, lint_cpp, coverage_paths)
#   - lcov 추출 경로: ci-packages.yml 의 coverage_paths field
#   - 본 파일의 flags / components / ignore 는 위 SSoT 와 정렬되어야 함
#
# ⚠ 2026-04-28 상태: ros2-advanced-ci.yml 에서 C++ coverage upload 가 일시
#   중단됨 (ament_cmake_test 가 ctest child 환경에서 ModuleNotFoundError —
#   agent_docs/ci-rewrite-plan.md §8 참조). Build (C++) 는 성공하지만
#   colcon test / lcov / Codecov upload step 모두 제거된 상태.
#   본 yaml 의 cpp flag 는 Codecov upload 가 복원될 때 다시 활성화됨.
#   Python coverage upload 는 정상 동작 중.
#
# 현재 워크스페이스 패키지 (총 20개, ci-packages.yml 의 build/test_cpp 카테고리):
#   rtc_*  : rtc_base, rtc_communication, rtc_controller_interface,
#            rtc_controller_manager, rtc_controllers, rtc_digital_twin,
#            rtc_inference, rtc_mpc, rtc_msgs, rtc_mujoco_sim,
#            rtc_scripts, rtc_tools, rtc_tsid, rtc_urdf_bridge
#   ur5e_* : ur5e_bringup, ur5e_bt_coordinator, ur5e_description,
#            ur5e_hand_driver
#   기타  : shape_estimation, shape_estimation_msgs

codecov:
  require_ci_to_pass: false   # coverage 업로드는 CI 실패와 독립적으로 처리
  notify:
    wait_for_ci: true         # cpp/python 두 업로드를 모두 받은 뒤 status 계산

github_checks:
  annotations: true           # PR diff 라인에 인라인 coverage annotation

coverage:
  precision: 2
  round: down
  range: "0...100"

  status:
    project:
      default:
        target: auto          # 이전 커밋 대비 자동 목표
        threshold: 0.5%       # 회귀 감지 (0.5%p)
        if_ci_failed: success
        informational: false
      # RT-critical 패키지는 별도 status로 회귀 감시 강화
      rt_core:
        target: auto
        threshold: 0.3%
        if_ci_failed: success
        paths:
          - "rtc_base/include/**"
          - "rtc_controller_manager/src/**"
          - "rtc_controllers/include/**"
          - "rtc_controllers/src/**"
    patch:
      default:
        target: 60%           # 신규/변경 코드 최소 커버리지
        threshold: 5%
        if_ci_failed: success

# C++/Python 분리 업로드 플래그 — ros2-advanced-ci.yml 의 codecov-action 의
# `flags: cpp` / `flags: python` 과 매핑 (D-3: jazzy 단일 distro 라 distro suffix 제거).
# carryforward: 변경 없는 flag는 직전 commit 결과 재사용 (PR 부분 빌드에서도 신호 유지).
flags:
  cpp:
    paths:
      - rtc_base/
      - rtc_communication/
      - rtc_controller_interface/
      - rtc_controller_manager/src/
      - rtc_controllers/
      - rtc_inference/
      - rtc_tsid/
      - rtc_urdf_bridge/
      - shape_estimation/
      - ur5e_bringup/
      - ur5e_bt_coordinator/
      - ur5e_hand_driver/
    carryforward: true
    carryforward_mode: "labels"
  python:
    paths:
      - rtc_tools/
      - rtc_digital_twin/
    carryforward: true
    carryforward_mode: "labels"

# 커버리지에서 제외할 경로
ignore:
  # 데이터/설정 전용 패키지
  - "ur5e_description/**"
  # CI 미빌드 패키지 (D-2: rtc_mujoco_sim 만 제외; rtc_mpc 는 ur5e_bringup
  # transitive 로 빌드되므로 제외하지 않음 — D-Q2)
  - "rtc_mujoco_sim/**"         # MuJoCo (옵셔널)
  # 메시지 정의 (rosidl 자동 생성 코드)
  - "rtc_msgs/**"
  - "shape_estimation_msgs/**"
  # Python 패키지 (별도 pytest 커버리지 → flag=python 분리 업로드)
  - "rtc_tools/**"
  - "rtc_digital_twin/**"
  # Shell 스크립트 / CI 빌드 산출물
  - "rtc_scripts/**"
  # 공통 제외 — 테스트/런치/설정/예제
  - "**/test/**"
  - "**/tests/**"
  - "**/launch/**"
  - "**/config/**"
  - "**/examples/**"
  # ROS 자동 생성 / 빌드 산출물
  - "**/build/**"
  - "**/install/**"
  - "**/log/**"

# 컴포넌트별 커버리지 추적 — 컴포넌트당 status block 부여
component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 1%
        if_ci_failed: success
  individual_components:
    - component_id: rt_base
      name: "RT Base (types, threading, filters)"
      paths:
        - "rtc_base/include/**"
    - component_id: communication
      name: "Communication (transport, codec)"
      paths:
        - "rtc_communication/include/**"
    - component_id: controller_interface
      name: "Controller Interface"
      paths:
        - "rtc_controller_interface/include/**"
        - "rtc_controller_interface/src/**"
    - component_id: controllers
      name: "Controllers (PD, CLIK, OSC, Grasp)"
      paths:
        - "rtc_controllers/include/**"
        - "rtc_controllers/src/**"
    - component_id: controller_manager
      name: "Controller Manager (RT loop)"
      # CI lcov --extract 가 src/만 추출 (include/ 미포함)
      paths:
        - "rtc_controller_manager/src/**"
    - component_id: inference
      name: "Inference Engine (ONNX)"
      paths:
        - "rtc_inference/include/**"
    - component_id: tsid
      name: "TSID (QP, tasks, constraints)"
      paths:
        - "rtc_tsid/include/**"
        - "rtc_tsid/src/**"
    - component_id: urdf_bridge
      name: "URDF Bridge (Pinocchio)"
      paths:
        - "rtc_urdf_bridge/include/**"
        - "rtc_urdf_bridge/src/**"
    - component_id: shape_estimation
      name: "Shape Estimation (ToF voxel)"
      paths:
        - "shape_estimation/include/**"
        - "shape_estimation/src/**"
    - component_id: hand_driver
      name: "Hand Driver (UDP, F/T inference)"
      paths:
        - "ur5e_hand_driver/include/**"
        - "ur5e_hand_driver/src/**"
    - component_id: bt_coordinator
      name: "BT Coordinator (BehaviorTree v4)"
      paths:
        - "ur5e_bt_coordinator/include/**"
        - "ur5e_bt_coordinator/src/**"
    - component_id: bringup
      name: "Bringup (Demo Controllers)"
      paths:
        - "ur5e_bringup/include/**"
        - "ur5e_bringup/src/**"

# PR 코멘트 — flags + components diff 포함, carryforward 표시
comment:
  layout: "header, diff, flags, components, files, footer"
  behavior: default
  require_changes: false
  show_carryforward_flags: true
