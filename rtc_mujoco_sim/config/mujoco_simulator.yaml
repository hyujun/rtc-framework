# MuJoCo Simulator Node Configuration
# ─────────────────────────────────────────────
# Launch with:
#   ros2 launch rtc_mujoco_sim mujoco_sim.launch.py
#   ros2 launch rtc_mujoco_sim mujoco_sim.launch.py sim_mode:=sync_step
#   ros2 launch rtc_mujoco_sim mujoco_sim.launch.py enable_viewer:=false

mujoco_simulator:
  ros__parameters:
    # ── Model ────────────────────────────────────────────────────────────────
    model_path: "robots/ur5e/mjcf/scene_with_hand.xml"

    # ── Simulation mode ───────────────────────────────────────────────────────
    sim_mode: "sync_step"

    # free_run only: publish state every N physics steps.
    publish_decimation: 1

    # sync_step only: max time to wait for a controller command (ms).
    sync_timeout_ms: 50.0

    # ── Max Real-Time Factor ──────────────────────────────────────────────────
    max_rtf: 1.0

    # ── Viewer ───────────────────────────────────────────────────────────────
    enable_viewer: true

    # ── Physics Timestep ──────────────────────────────────────────────────────
    physics_timestep: 0.002 # seconds  (= 500 Hz)

    # ── Position Servo Gains (글로벌 기본값) ──────────────────────────────────
    use_yaml_servo_gains: false
    servo_kp: [500.0, 500.0, 500.0, 150.0, 150.0, 150.0]
    servo_kd: [400.0, 400.0, 400.0, 100.0, 100.0, 100.0]

    # ── Robot Response (MuJoCo 물리 시뮬레이션) ──────────────────────────────
    # joint_names 합집합 == XML 전체 joints (양방향 완전 일치 필수)
    # 하나라도 다르면 Initialize() FAIL.
    robot_response:
      groups: ["ur5e", "hand"]
      ur5e:
        joint_names:
          - shoulder_pan_joint
          - shoulder_lift_joint
          - elbow_joint
          - wrist_1_joint
          - wrist_2_joint
          - wrist_3_joint
        command_topic: "/ur5e/joint_command"
        state_topic: "/joint_states"
      hand:
        joint_names:
          - thumb_cmc_aa
          - thumb_cmc_fe
          - thumb_mcp_fe
          - index_mcp_aa
          - index_mcp_fe
          - index_dip_fe
          - middle_mcp_aa
          - middle_mcp_fe
          - middle_dip_fe
          - ring_mcp_fe
        command_topic: "/hand/command"
        state_topic: "/hand/joint_states"

    # ── Fake Response (LPF 에코백, MuJoCo 물리 아님) ─────────────────────────
    # robot_response와 같은 그룹 이름 중복 불가.
    # 토픽 이름이 비어있으면 에러.
    # XML에 hand가 없는 모델 사용 시 hand를 fake_response로 이동.
    # fake_response:
    #   groups: ["hand"]
    #   hand:
    #     joint_names:
    #       - thumb_cmc_aa
    #       - thumb_cmc_fe
    #       - thumb_mcp_fe
    #       - index_mcp_aa
    #       - index_mcp_fe
    #       - index_dip_fe
    #       - middle_mcp_aa
    #       - middle_mcp_fe
    #       - middle_dip_fe
    #       - ring_mcp_fe
    #     command_topic: "/hand/command"
    #     state_topic: "/hand/joint_states"
    #     filter_alpha: 0.1

# ── rt_controller parameter overrides for simulation ─────────────────────
rt_controller:
  ros__parameters:
    enable_estop: false
    robot_timeout_ms: 10000.0
    hand_timeout_ms: 10000.0
    init_timeout_sec: 0.0
