# shape_estimation_node.yaml — ToF 기반 형상 추정 + 탐색 모션 설정
# enable_exploration: false로 탐색 모션 비활성화 가능 (순수 추정 모드)
shape_estimation_node:
  ros__parameters:
    # ── 기존 형상 추정 파라미터 ──────────────────────────────────────────────
    voxel_resolution: 0.002          # [m] 복셀 해상도
    max_points: 2048                 # 최대 포인트 수
    point_expiry_sec: 5.0            # [s] 포인트 만료 시간
    flat_curvature_threshold: 5.0    # [1/m] 평면 곡률 임계값
    curvature_uniformity_threshold: 2.0
    min_points_for_fitting: 10       # 피팅 최소 포인트 수
    publish_rate_hz: 10.0            # [Hz] 추정 결과 publish 주기
    viz_rate_hz: 5.0                 # [Hz] 시각화 publish 주기
    frame_id: "base_link"

    # ── 돌출 구조 탐지 ─────────────────────────────────────────────────────────
    protuberance:
      residual_threshold: -0.005          # [m] 음의 잔차 임계값
      min_cluster_points: 3               # 최소 클러스터 포인트 수
      cluster_radius: 0.015               # [m] 공간적 연결 반경
      gap_distance_jump: 0.020            # [m] gap 전후 거리 차이 임계값
      min_gap_invalid_count: 2            # 연속 invalid 최소 수
      curvature_jump_threshold: 15.0      # [1/m] 곡률 급변 임계값
      gap_cluster_association_radius: 0.020  # [m] gap-클러스터 연결 반경

    # ── 탐색 모션 on/off ─────────────────────────────────────────────────────
    enable_exploration: true          # false → Action Server 미생성, 순수 추정만

    # ── 탐색 모션 설정 (enable_exploration: true일 때만 사용) ─────────────────
    exploration:
      # RT Controller 연동
      robot_namespace: "ur5e"                 # 토픽 접두사 (/{ns}/controller_type 등)
      controller_name: "demo_task_controller" # 탐색 시 활성화할 컨트롤러
      controller_switch_delay_ms: 200         # 컨트롤러 전환 후 대기 시간 [ms]

      # 탐색 시 DemoTaskController 게인 (16개)
      # [kp_trans×3, kp_rot×3, damping, null_kp, enable_null_space(0/1),
      #  control_6dof(0/1), traj_speed, traj_angular_speed,
      #  hand_traj_speed, max_vel, max_angular_vel, hand_max_vel]
      exploration_gains:
        kp_translation: [10.0, 10.0, 10.0]
        kp_rotation: [5.0, 5.0, 5.0]
        damping: 0.01
        null_kp: 0.0
        enable_null_space: false
        control_6dof: true
        trajectory_speed: 0.05           # [m/s] 탐색에 적합한 낮은 속도
        trajectory_angular_speed: 0.3    # [rad/s]
        hand_trajectory_speed: 0.0
        max_traj_velocity: 0.10          # [m/s]
        max_traj_angular_velocity: 0.5   # [rad/s]
        hand_max_traj_velocity: 0.0

      # Phase 0: Approach — 물체 방향으로 step-by-step 접근
      approach_step_size: 0.005          # [m]
      approach_timeout_sec: 5.0          # [s]

      # Phase 1: Servo — ToF 거리 기반 접근 서보
      servo_target_distance: 0.030       # [m]
      servo_step_gain: 0.5
      servo_max_step: 0.005              # [m]
      servo_converge_tol: 0.003          # [m]
      servo_timeout_sec: 3.0             # [s]
      servo_min_valid_sensors: 3

      # Phase 2: Sweep — 표면 추종 lateral sweep
      sweep_step_size: 0.003             # [m]
      sweep_width: 0.06                  # [m]
      sweep_normal_gain: 0.5
      sweep_normal_max_step: 0.003       # [m]

      # Phase 3: Tilt — 손목 틸트 스캔
      tilt_amplitude_deg: 15.0           # [deg]
      tilt_steps: 10

      # Safety
      min_distance: 0.005                # [m] ToF 최소 안전 거리
      max_step_size: 0.010               # [m] 1회 최대 이동량

      # Evaluation — 추정 결과 평가
      confidence_threshold: 0.8
      min_points_for_success: 20
      max_total_time_sec: 10.0           # [s]
      max_sweep_cycles: 3

      # Explore loop rate
      explore_rate_hz: 10.0              # [Hz]
